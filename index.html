    const restF    = calcRestAndFatigue(pid, playerTeamId, teamSchedules, today, playerStatus);
    const blowoutF = calcBlowoutFactor(spread, resolvedIsHome);
    const paceF    = getPaceFactor(g.home_team.id, g.visitor_team.id, teamStats, h2hAdjustments[g.id], recentTeamTotals);
    const usageF   = getUsageFactor(statRows, seasonAvgs[pid]?parseMins(seasonAvgs[pid].min):30, playerAdvancedStats[pid]);
    const homeAwayF = resolvedIsHome ? 1.015 : 0.985;

    // First pass: base projections for correlations
    const baseProjections={};
    for(const statType of TARGETS){
      const sk=STAT_MAP[statType];
      const lineInfo=propInfo.props[statType];
      const gameLog=buildGameLog(statRows,playerTeamId,sk,20);
      if(gameLog.length<3) continue;
      const wf=winsorize(gameLog.map(g=>g.value).slice(0,10));
      const avg10=wf.clean.reduce((a,b)=>a+b,0)/wf.clean.length;
      const edge=lineInfo?(avg10-parseFloat(lineInfo.line)):0;
      baseProjections[statType]={edge,avg10};
    }

    const corrNudges=applyCorrelations(baseProjections);

    // Second pass: full projections with all factors
    const propResults=[];
    for(const statType of TARGETS){
      const sk=STAT_MAP[statType], lineInfo=propInfo.props[statType];
      const gameLog=buildGameLog(statRows,playerTeamId,sk,20);
      if(gameLog.length<3) continue;

      const positionalDef = getPositionalDefFactor(oppTeamId,meta.position||'',teamStats,statType,recentOppDef);
      const schedF        = calcScheduleStrength(gameLog,teamStats,statType);
      const haySplits     = calcHomeAwaySplits(gameLog,sk);
      const per36         = calcPer36(gameLog);
      const fdOdds        = getFDOdds(propsByGame,g.id,pid,statType);
      const injuryImpact     = calcInjuryImpact(pid,playerMeta,injuries,playerTeamId,oppTeamId,statType,seasonAvgsCache);
      const totalFactor     = calcTotalFactor(gameTotal, statType);
      const oppFatigue      = calcOpponentFatigue(oppTeamId, teamSchedules, today);
      const returnFromInjury = calcReturnFromInjury(gameLog);  // [NEW v5.3]

      // H2H factor — player's historical performance vs tonight's specific opponent
      // Compute overall L20 avg first so calcH2HFactor has the right baseline
      const l10vals   = gameLog.slice(0, 10).map(g => g.value);
      const overallAvg10 = l10vals.length ? l10vals.reduce((a,b)=>a+b,0)/l10vals.length : 0;
      const h2hRows   = playerH2HStats[pid] || [];
      const h2hFactor = calcH2HFactor(h2hRows, sk, overallAvg10);

      // Multi-book consensus line — stronger prior when books agree
      const consensus  = computeMultiBookConsensus(propsByGame, g.id, pid, statType);

      const splitFactor = haySplits.homeAvg&&haySplits.awayAvg&&haySplits.homeGames>=2&&haySplits.awayGames>=2
        ? 1.0+(((resolvedIsHome?haySplits.homeAvg:haySplits.awayAvg)-(haySplits.homeAvg+haySplits.awayAvg)/2)/Math.max((haySplits.homeAvg+haySplits.awayAvg)/2,0.1))*0.35
        : 1.0;

      // Use consensus median line as market prior when available; else FD line
      const marketLineVal = consensus?.medianLine ?? (lineInfo ? parseFloat(lineInfo.line) : null);

      const factors={
        positionalDef, pace:paceF.factor, usage:usageF.factor,
        rest:restF, blowout:blowoutF, injuryImpact, scheduleStrength:schedF,
        homeAway:splitFactor, marketLine:marketLineVal,
        corrNudge:corrNudges[statType]?.nudge||0,
        totalFactor, h2hFactor, oppFatigue, consensus, returnFromInjury,
      };

      const model=buildProjection(gameLog,factors); if(!model) continue;

      const streakF   = calcStreakRegression(gameLog,lineInfo?.line||model.proj,model.avg20);
      const finalProj = model.proj*streakF.factor;

      const simLine=lineInfo?parseFloat(lineInfo.line):(seasonAvgs[pid]?(seasonAvgs[pid][sk]||finalProj):finalProj);
      const cleanGameCount = Math.min(gameLog.length, 10);
      const sim=runSim(Math.max(0,finalProj),model.std,simLine,fdOdds,cleanGameCount);

      propResults.push({
        statType, line:lineInfo?.line||null, hasLine:!!lineInfo, isFanDuel:lineInfo?.vendor==='fanduel',
        sim, gameLog, fdOdds,
        modelFactors:{
          avg10:model.avg10, avg20:model.avg20, wAvg:model.wAvg,
          baseProj:model.base, contextualProj:model.contextual,
          rawAvg10:model.rawAvg10, outliers:model.outliers, w10upper:model.w10upper,
          positionalDef, pace:paceF, usage:usageF, rest:restF, blowout:blowoutF,
          injuryImpact, scheduleStrength:schedF, homeAwaySplits:haySplits,
          streak:streakF, per36, totalFactor, h2hFactor, oppFatigue, consensus, returnFromInjury,
          _marketBlend:factors._marketBlend, corrNudge:corrNudges[statType]?.nudge||0, fdOdds,
          homeDesc:resolvedIsHome?'+1.5% (home)':'-1.5% (away)',
        },
      });
    }

    if(!propResults.length) continue;
    simmedCount++;
    if (simmedCount % 5 === 0) {
      const pct = Math.round(66 + (simmedCount/totalToSim)*20);
      await updateProgress(pct, `Simulating ${simmedCount}/${totalToSim} players...`);
    }
    gameData[propInfo.gameId].players.push({
      pid, playerName:`${meta.first_name} ${meta.last_name}`,
      team:teamAbbr, position:meta.position||'—', injStatus:inj?inj.status:null,
      isHome:resolvedIsHome, gameId:propInfo.gameId, oppTeamAbbr:oppAbbr,
      propResults, bestConf:Math.max(...propResults.map(p=>p.sim.conf)),
    });
  }

  for(const gd of Object.values(gameData)) gd.players.sort((a,b)=>b.bestConf-a.bestConf);

  await updateProgress(88, 'Building best bets...');

  const allBestBets=[];
  for(const gd of Object.values(gameData)){
    for(const p of gd.players){
      if(p.injStatus?.toLowerCase().includes('out')) continue;
      for(const pr of p.propResults){
        if(!pr.hasLine||pr.sim.rec==='PUSH'||pr.sim.conf<65) continue;
        allBestBets.push({...pr,playerName:p.playerName,team:p.team,game:gd.game,playerData:p});
      }
    }
  }
  allBestBets.sort((a,b)=>b.sim.conf-a.sim.conf);

  const allBookOdds = await fetchAllBookOdds(games.map(g=>g.id), today);

  // ── NEW EXTERNAL DATA SOURCES ─────────────────────
  await updateProgress(92, 'Fetching PrizePicks lines & referee data...');
  const [ppLines, refAssignments] = await Promise.all([
    fetchPrizePicksLines(),
    fetchRefereeAssignments(games),
  ]);

  await updateProgress(96, 'Rendering dashboard...');
  await dismissLoading();

  const _result = buildHTML(gameData,injuries,today,propsByGame,allBookOdds,lineups,ppLines,refAssignments);
  // Inject HTML (no document.write — avoids iOS script execution issues)
  var appDiv = document.getElementById('nba-app');
  if (appDiv) {
    appDiv.innerHTML = _result.html;

    // Set globals for interactive functions — use data returned from buildHTML
    AP         = _result.allPropsFlat;
    PROP_LOGS  = _result.propLogMap;
    GAME_CARDS = _result.gameCardsArr;
    REF_TABLE  = REF_FOUL_TABLE;
    API_KEY_WV = API_KEY;
    BASE_WV    = BASE;

    // Show app
    document.getElementById('loading-screen').style.display = 'none';
    appDiv.style.display = 'block';

    // Wire interactivity
    initApp();
  }
}

// ─────────────────────────────────────────
//  WIDGET
// ─────────────────────────────────────────

// ── Boot ─────────────────────────────────────────────────────────
main().catch(function(err) {
  console.error('NBA Prophet error:', err);
  showError('Something went wrong: ' + (err.message || String(err)) + ' — tap Try Again.');
});
</script>
