//  ALT LINE SCANNER HTML BUILDER  [NEW v5]
// ═══════════════════════════════════════════════════════
function buildAltLineScannerHTML(altScanResults, mainLine, statType, playerName) {
  if (!altScanResults || !altScanResults.length) {
    return `<div class="alt-empty">Alt line data unavailable for this prop.</div>`;
  }

  const mainLineF = parseFloat(mainLine);
  const lastName  = playerName.split(' ').slice(1).join(' ') || playerName;

  // Best EV play (already sorted, [0] is best)
  const bestPlay  = altScanResults[0];
  const bestIsMain = bestPlay.isMainLine;

  // Sort by line value for display
  const sorted = [...altScanResults].sort((a,b) => a.line - b.line);

  const rows = sorted.map(r => {
    const isMain  = r.isMainLine;
    const rcColor = r.bestSide === 'OVER' ? '#00d4aa' : '#ff3d5a';
    const rcBg    = r.bestSide === 'OVER' ? '#003d30' : '#3d0010';
    const l10Color  = r.l10OverPct >= 65 ? '#00d4aa' : r.l10OverPct <= 35 ? '#ff3d5a' : '#7a90b5';
    const l20Color  = r.l20OverPct >= 65 ? '#00d4aa' : r.l20OverPct <= 35 ? '#ff3d5a' : '#7a90b5';
    const agreeIcon = r.historiesAgree ? '' : '<span style="color:#ffb627;font-size:9px" title="L10 and L20 disagree"> ⚠</span>';
    const highDivergence = r.confidenceDrop >= 20;
    return `<tr class="alt-row ${isMain?'alt-main-row':''}">
      <td class="alt-line-col">
        ${isMain ? `<span class="alt-main-badge">MAIN</span>` : ''}
        <strong style="color:${isMain?'#ffb627':'#dde6f5'}">${r.line}</strong>
      </td>
      <td class="alt-l10-col">
        <span style="color:${l10Color};font-weight:700">${r.l10Hits}/${r.l10Games}</span>
        <span style="color:${l10Color};font-size:10px"> (${r.l10OverPct}%)</span>
      </td>
      <td class="alt-l20-col">
        <span style="color:${l20Color};font-weight:600">${r.l20Hits}/${r.l20Games}</span>
        <span style="color:${l20Color};font-size:10px"> (${r.l20OverPct}%)</span>
        ${agreeIcon}
      </td>
      <td class="alt-blend-col" style="color:${rcColor};font-weight:700">${r.blendedOverPct}%${highDivergence?'<span style="color:#ffb627;font-size:9px"> *</span>':''}</td>
      <td class="alt-rec-col">
        <span class="alt-rec-pill" style="background:${rcBg};color:${rcColor}">${r.bestSide}</span>
      </td>
    </tr>`;
  }).join('');

  const hasDivergence = altScanResults.some(r => r.confidenceDrop >= 20);

  return `<div class="alt-scanner">
    <div class="alt-header">
      <div class="alt-title">🔍 ALT LINE SCANNER</div>
      <div class="alt-subtitle">Real L10 + L20 hit rates from game logs</div>
    </div>
    <div class="alt-table-wrap">
      <table class="alt-table">
        <thead><tr><th>LINE</th><th>L10 OVER</th><th>L20 OVER</th><th>BLEND%</th><th>REC</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
    ${hasDivergence ? `<div class="alt-diverge-note">⚠ Lines marked * — L10/L20 diverge ≥20%, interpret with caution.</div>` : ''}
    <div class="alt-disclaimer">Hit rates from real BallDontLie game logs · Blended = 60% L10 + 40% L20</div>
  </div>`;
}

// ═══════════════════════════════════════════════════════
//  DETAILED NARRATIVE BUILDER
// ═══════════════════════════════════════════════════════
function buildDetailedNarrative(playerName, statType, sim, mf, gameLog, line, isHome, oppAbbr) {
  const lastName = playerName.split(' ').slice(1).join(' ') || playerName;
  const lbl      = {points:'points',rebounds:'rebounds',assists:'assists',threes:'three-pointers'}[statType];
  const lineF    = parseFloat(line);
  const sections = [];

  // 1. BASE NUMBERS
  const outlierNote = mf.outliers?.length
    ? ` <em>(${mf.outliers.length} outlier game${mf.outliers.length>1?'s':''} detected — ${mf.outliers.map(o=>`${o.original}→${o.capped}`).join(', ')} — capped using IQR method. Raw avg was ${mf.rawAvg10?.toFixed(1)}, cleaned avg is ${mf.avg10?.toFixed(1)}.)</em>`
    : '';
  sections.push(`<div class="narr-section">
    <div class="narr-title">📊 BASE NUMBERS (EXPONENTIAL DECAY WEIGHTED)</div>
    <div class="narr-body">${lastName} averages <strong>${mf.avg10?.toFixed(1)}</strong> ${lbl} over the last 10 games${outlierNote} and <strong>${mf.avg20?.toFixed(1)}</strong> over the last 20. <strong>Exponential-decay weighted avg</strong> (most recent game = ${(1).toFixed(2)}x, oldest ≈ ${Math.pow(EXP_DECAY,9).toFixed(2)}x): <strong>${mf.wAvg?.toFixed(1)}</strong>. Base projection before contextual adjustments: <strong>${mf.baseProj?.toFixed(1)}</strong>.
    ${mf.per36?.per36L10 ? ` Per-36-min (L10): <strong>${mf.per36.per36L10}</strong> × ${mf.per36.avgMin} avg min = <strong>${mf.per36.per36proj}</strong> projected from efficiency.` : ''}</div>
  </div>`);

  // 2. HOME/AWAY SPLITS
  if (mf.homeAwaySplits?.homeAvg!=null && mf.homeAwaySplits?.awayAvg!=null && mf.homeAwaySplits.homeGames>=3 && mf.homeAwaySplits.awayGames>=3) {
    const diff     = mf.homeAwaySplits.diff;
    const tonight  = isHome ? mf.homeAwaySplits.homeAvg : mf.homeAwaySplits.awayAvg;
    const label    = isHome ? 'HOME' : 'AWAY';
    const diffDesc = diff>0 ? `plays better at home (+${diff})` : diff<0 ? `plays better on the road (${Math.abs(diff)} higher away)` : `equal home/away splits`;
    sections.push(`<div class="narr-section">
      <div class="narr-title">🏠 HOME / AWAY SPLIT</div>
      <div class="narr-body">Home: <strong>${mf.homeAwaySplits.homeAvg}</strong> (${mf.homeAwaySplits.homeGames} games) · Away: <strong>${mf.homeAwaySplits.awayAvg}</strong> (${mf.homeAwaySplits.awayGames} games). ${lastName} ${diffDesc}. Tonight is <strong>${label}</strong> — split avg: <strong>${tonight}</strong>.</div>
    </div>`);
  }

  // 3. GAME TOTAL ADJUSTMENT
  if (mf.totalFactor && Math.abs(mf.totalFactor.factor - 1.0) > 0.005) {
    const tf = mf.totalFactor;
    sections.push(`<div class="narr-section" style="border-left-color:var(--blue)">
      <div class="narr-title">⚡ GAME TOTAL / PACE-TOTAL ADJUSTMENT</div>
      <div class="narr-body">${tf.desc}. The O/U total encodes expected possession count — more possessions means more counting stat opportunities for every player in the game. ${tf.diff > 0 ? `<strong>This high-total game is a +${((tf.factor-1)*100).toFixed(1)}% boost</strong> to ${statType} projections.` : `<strong>This low-total game suppresses ${statType} projections by ${((1-tf.factor)*100).toFixed(1)}%.</strong>`} Effect is strongest on points, then assists, then threes — weakest on steals/blocks.</div>
    </div>`);
  }

  // 3a. HEAD-TO-HEAD HISTORY
  if (mf.h2hFactor && mf.h2hFactor.games >= 1) {
    const h2h = mf.h2hFactor;
    const dir = h2h.factor > 1.02 ? 'outperforms' : h2h.factor < 0.98 ? 'underperforms' : 'performs similarly to';
    sections.push(`<div class="narr-section" style="border-left-color:var(--blue)">
      <div class="narr-title">🆚 HEAD-TO-HEAD VS TONIGHT'S OPPONENT</div>
      <div class="narr-body">${lastName} <strong>${dir}</strong> their overall average against this specific team. H2H avg: <strong>${h2h.h2hAvg}</strong> vs overall avg: <strong>${h2h.overallAvg?.toFixed(1)||'?'}</strong> (${h2h.games} matchup${h2h.games>1?'s':''}, exponential-decay weighted). ${h2h.desc}. ${Math.abs(h2h.factor-1)>0.04?`<strong>This is a significant matchup edge — factor applied at 20% weight to avoid over-fitting the small sample.</strong>`:''}</div>
    </div>`);
  }

  // 3b. OPPONENT FATIGUE
  if (mf.oppFatigue && mf.oppFatigue.factor > 1.01) {
    sections.push(`<div class="narr-section" style="border-left-color:var(--teal)">
      <div class="narr-title">😮‍💨 OPPONENT FATIGUE</div>
      <div class="narr-body">${mf.oppFatigue.desc}. Fatigued defenses give up more points, have lower defensive intensity, and allow easier looks — a measurable and consistent effect in NBA prop outcomes.</div>
    </div>`);
  }

  // 3c. MULTI-BOOK CONSENSUS
  if (mf.consensus && mf.consensus.bookCount >= 2) {
    const c = mf.consensus;
    const lineNote = c.medianLine !== c.fdLine
      ? `FanDuel: ${c.fdLine ?? '—'}, consensus median: <strong>${c.medianLine}</strong>`
      : `All books aligned at <strong>${c.medianLine}</strong>`;
    sections.push(`<div class="narr-section">
      <div class="narr-title">📚 MULTI-BOOK CONSENSUS (${c.bookCount} BOOKS)</div>
      <div class="narr-body">${lineNote} · Line range across books: <strong>${c.lineRange}</strong>. ${c.isConsensus?`<strong>Books in tight consensus — high-confidence prior, weighted at ${Math.round(c.priorWeight*100)}% in model blend.</strong>`:`Books split — moderate prior weight (${Math.round(c.priorWeight*100)}%).`}</div>
    </div>`);
  }

  // 4. SCHEDULE STRENGTH
  if (mf.scheduleStrength && mf.scheduleStrength.factor !== 1.0 && mf.scheduleStrength.games?.length >= 3) {
    const ss = mf.scheduleStrength;
    sections.push(`<div class="narr-section">
      <div class="narr-title">📅 RECENT SCHEDULE QUALITY</div>
      <div class="narr-body">${ss.desc}. Raw L10 avg: <strong>${ss.rawAvg}</strong> · Defense-adjusted avg: <strong>${ss.adjustedAvg}</strong>.
      ${Math.abs(ss.factor-1)>0.03 ? ` <strong>${ss.factor>1 ? 'Numbers are more impressive than they appear given the schedule difficulty.' : 'Numbers may be inflated by a soft recent schedule.'}</strong>` : ''}</div>
    </div>`);
  }

  // 5. INJURY IMPACT
  const inj = mf.injuryImpact;
  if (inj && inj.anyAdjustment) {
    const netPct = ((inj.factor - 1) * 100).toFixed(1);
    const parts  = [];
    if (inj.teamInjuries.length) {
      parts.push(`<strong>Teammate(s) out:</strong> ${inj.teamInjuries.map(d =>
        `${d.player} (${d.pos}, ${d.minAvg} mpg) — ${d.isStar?'star':'starter'} out, projecting ~${(d.boost*100).toFixed(1)}% of their usage flows to ${lastName}`
      ).join('; ')}.`);
    }
    if (inj.oppInjuries.length) {
      parts.push(`<strong>Opponent(s) out:</strong> ${inj.oppInjuries.map(d =>
        `${d.player} (${d.pos}) — ${d.type==='opp_star_out'?'star scorer out, defense spreads thinner':'starting defender out, backup matchup likely'} (+${(d.boost*100).toFixed(1)}%)`
      ).join('; ')}.`);
    }
    sections.push(`<div class="narr-section" style="border-left-color:var(--amber)">
      <div class="narr-title">🏥 INJURY IMPACT</div>
      <div class="narr-body">${parts.join('<br>')}
      <br><strong>Net injury adjustment: ${inj.factor>1?'+':''}${netPct}%</strong>. ${inj.factor>1.10?`<strong>Significant boost — meaningful injury edge.</strong>`:''}
      </div>
    </div>`);
  } else if (inj) {
    sections.push(`<div class="narr-section">
      <div class="narr-title">🏥 INJURY IMPACT</div>
      <div class="narr-body">No injury adjustments — all relevant starters on both teams are healthy.</div>
    </div>`);
  }

  // 6. REST / B2B / FATIGUE
  if (mf.rest) {
    const fatigueNote = mf.rest.fatigueFactor < 1.0
      ? `<br><strong style="color:var(--red)">${mf.rest.fatigueDesc}</strong> (${mf.rest.games4d} games in 4 nights, ${mf.rest.games7d} in 7 nights)`
      : '';
    sections.push(`<div class="narr-section">
      <div class="narr-title">😴 REST, LOAD & FATIGUE</div>
      <div class="narr-body">${mf.rest.desc}.${fatigueNote} ${mf.rest.restFactor<0.98?`Back-to-back is the strongest rest suppressor — ~4.5% fewer counting stats.`:mf.rest.restFactor>1.0?`Extended rest is a modest positive.`:`One day rest is league-normal.`}
      ${mf.sim?.samplePenaltyApplied?`<br><span style="color:var(--amber)">⚠ Sample size penalty applied — only ${mf.sim?.cleanGameCount} clean games in window, confidence reduced.</span>`:''}</div>
    </div>`);
  }

  // 7. OPPONENT & POSITIONAL DEFENSE
  if (mf.positionalDef) {
    const pd = mf.positionalDef;
    sections.push(`<div class="narr-section">
      <div class="narr-title">🛡️ OPPONENT DEFENSE</div>
      <div class="narr-body">Matchup: <strong>${pd.posGroup?.toUpperCase()||'?'}</strong> vs ${oppAbbr}'s defense. ${pd.desc}. ${pd.isPrimary?`<strong>Primary stat for this position group — matchup carries extra weight.</strong>`:''} ${Math.abs((pd.factor||1)-1)>0.04?`<strong>${(pd.factor||1)>1?`Favorable matchup — +${(((pd.factor||1)-1)*100).toFixed(1)}% boost.`:`Tough matchup — ${((1-(pd.factor||1))*100).toFixed(1)}% drag.`}</strong>`:''}</div>
    </div>`);
  }

  // 8. PACE
  if (mf.pace && Math.abs(mf.pace.factor-1)>0.01) {
    sections.push(`<div class="narr-section">
      <div class="narr-title">⚡ TEAM PACE</div>
      <div class="narr-body">${mf.pace.desc}. ${mf.pace.factor>1?`More possessions = more opportunities.`:`Fewer possessions compress stat lines.`}</div>
    </div>`);
  }

  // 9. GAME SCRIPT
  if (mf.blowout && Math.abs(mf.blowout.factor-1)>0.005) {
    sections.push(`<div class="narr-section">
      <div class="narr-title">🎭 GAME SCRIPT</div>
      <div class="narr-body">${mf.blowout.desc}. ${mf.blowout.factor<1?`Comfortable wins = reduced star minutes in 4Q.`:`Underdogs tend to play starters extra minutes chasing the game.`}</div>
    </div>`);
  }

  // 10. VEGAS PRIOR
  if (mf._marketBlend) {
    sections.push(`<div class="narr-section">
      <div class="narr-title">📈 MARKET LINE PRIOR</div>
      <div class="narr-body">${mf._marketBlend.desc}. Final projection: <strong>70% model + 30% market line</strong>. ${Math.abs(mf._marketBlend.diff)>2?`<strong>Model disagrees with market by ${Math.abs(mf._marketBlend.diff).toFixed(1)} — significant gap.</strong>`:''}</div>
    </div>`);
  }

  // 11. STREAK
  if (mf.streak) {
    sections.push(`<div class="narr-section">
      <div class="narr-title">🔥 STREAK ANALYSIS</div>
      <div class="narr-body">${mf.streak.desc}. ${mf.streak.streak>=6?`Extreme streaks regress — line setters have adjusted.`:mf.streak.streak>=3?`Notable streak but not at regression threshold.`:`No significant streak.`}</div>
    </div>`);
  }

  // 12. HEAD-TO-HEAD MATCHUP HISTORY
  if (mf.h2hFactor && mf.h2hFactor.games >= 1) {
    const h2h = mf.h2hFactor;
    const h2hColor = h2h.factor > 1.03 ? 'var(--teal)' : h2h.factor < 0.97 ? 'var(--red)' : 'var(--mid)';
    sections.push(`<div class="narr-section" style="border-left-color:${h2hColor}">
      <div class="narr-title">🔁 HEAD-TO-HEAD HISTORY vs ${oppAbbr}</div>
      <div class="narr-body">${h2h.desc}. ${h2h.games >= 4 ? `<strong>Sample of ${h2h.games} meetings — statistically meaningful.</strong>` : `Small sample (${h2h.games} meeting${h2h.games>1?'s':''}) — applied at 20% weight to avoid overfitting.`}
      ${Math.abs(h2h.factor-1) > 0.03 ? `<br>H2H avg ${h2h.h2hAvg} vs overall avg — <strong>${h2h.factor > 1 ? 'consistently outperforms vs this defense' : 'consistently underperforms vs this defense'}.</strong>` : ''}</div>
    </div>`);
  }

  // 13. RETURN FROM INJURY
  if (mf.returnFromInjury?.isReturning) {
    const rfi = mf.returnFromInjury;
    sections.push(`<div class="narr-section" style="border-left-color:var(--amber)">
      <div class="narr-title">🩹 RETURN FROM INJURY</div>
      <div class="narr-body">${rfi.desc}. <strong>Players returning from significant absences (${rfi.gapDays}+ days) typically need 3–5 games to reach full production</strong> — conditioning, rhythm, and role clarity all take time to restore. This is a real suppressor even when a player appears healthy.</div>
    </div>`);
  }

  // 14. OPPONENT FATIGUE
  if (mf.oppFatigue && mf.oppFatigue.factor > 1.01) {
    sections.push(`<div class="narr-section" style="border-left-color:var(--blue)">
      <div class="narr-title">😩 OPPONENT FATIGUE</div>
      <div class="narr-body">${mf.oppFatigue.desc}. When a defense is on a compressed schedule, rotations slow, closeouts get lazy, and help-side awareness drops. This player gets a small boost from facing a fatigued defense.</div>
    </div>`);
  }

  // 15. MULTI-BOOK CONSENSUS
  if (mf.consensus && mf.consensus.bookCount >= 2) {
    const cs = mf.consensus;
    const consensusColor = cs.isConsensus ? 'var(--teal)' : 'var(--mid)';
    sections.push(`<div class="narr-section">
      <div class="narr-title">📚 MULTI-BOOK CONSENSUS (${cs.bookCount} books)</div>
      <div class="narr-body">${cs.bookCount} books have lines on this prop. Median line: <strong>${cs.medianLine}</strong> · Line range: <strong>${cs.lineRange}</strong> pts across books.
      ${cs.isConsensus ? `<strong style="color:${consensusColor}">Tight consensus (≤0.5 pts) — strong market agreement. Prior weight increased to ${(cs.priorWeight*100).toFixed(0)}%.</strong>` : cs.lineRange > 1.5 ? `<span style="color:var(--amber)">Wide line range (${cs.lineRange} pts) — books disagree; market is uncertain here.</span>` : `Books broadly in agreement — standard ${(cs.priorWeight*100).toFixed(0)}% prior weight applied.`}</div>
    </div>`);
  }

  // 16. SAMPLE SIZE NOTE (if penalty was applied)
  if (sim.samplePenaltyApplied) {
    sections.push(`<div class="narr-section" style="border-left-color:var(--amber)">
      <div class="narr-title">⚠ SMALL SAMPLE WARNING</div>
      <div class="narr-body">Only <strong>${sim.cleanGameCount} qualifying games</strong> in the current window — confidence score was reduced by ${Math.round((10 - sim.cleanGameCount) * 2.5)} points to reflect the thinner data. This could be due to injury absence, recent trade, or early-season thin data. Treat this projection with extra caution.</div>
    </div>`);
  }

  // 17. SIMULATION SUMMARY + EV
  const recOdds = sim.rec==='OVER' ? mf.fdOdds?.over : mf.fdOdds?.under;
  const ev      = sim.ev;
  const evColor = ev?.profitable ? 'var(--teal)' : 'var(--red)';
  sections.push(`<div class="narr-section narr-sim-summary">
    <div class="narr-title">🎲 SIMULATION SUMMARY</div>
    <div class="narr-body"><strong>${N_SIMS.toLocaleString()} Monte Carlo runs</strong> · projection ${sim.proj} · std ±${sim.std}.
    <br>Result: <strong style="color:${sim.rec==='OVER'?'var(--teal)':sim.rec==='UNDER'?'var(--red)':'var(--mid)'}">${sim.rec} — ${sim.rec==='OVER'?sim.overPct:sim.underPct}%</strong> · Edge: <strong>${sim.edge>0?'+':''}${sim.edge}</strong>.
    <br>Range (p10–p90): <strong>${sim.p10}–${sim.p90}</strong> · IQR: <strong>${sim.p25}–${sim.p75}</strong>.
    ${ev?.ev!=null?`<br><span style="color:${evColor};font-weight:700">EV: ${ev.evStr}</span> at ${recOdds>0?'+':''}${recOdds||'N/A'} · Breakeven: ${ev.breakeven}% · ${ev.profitable?'✓ POSITIVE EV':'✗ NEGATIVE EV (vig eats the edge)'}`:''}</div>
  </div>`);

  return `<div class="narrative-block">${sections.join('')}</div>`;
}

//  HTML BUILDER

function buildHTML(gameData, injuries, today, propsByGame, allBookOdds, lineups, ppLines={}, refAssignments={}) {

  const outPlayers   = injuries.filter(i => { const s=i.status?.toLowerCase()||''; return s.includes('out')||s.includes('likely inactive'); }).slice(0,12);
  const qPlayers     = injuries.filter(i => { const s=i.status?.toLowerCase()||''; return s.includes('questionable')||s.includes('doubtful')||s.includes('game-time'); }).slice(0,8);
  const inferredOut  = injuries.filter(i => i.source==='inferred').slice(0,6);
  const staleCleared = injuries.filter(i => i.staleCleared).slice(0,4);

  function fmtOdds(n){ return n!=null?(n>0?`+${n}`:String(n)):'—'; }
  function injBadge(pid){
    const inj=injuries.find(i=>i.player?.id===pid); if(!inj) return '';
    const s=inj.status?.toLowerCase()||'';
    if(s.includes('out')) return `<span class="badge badge-out">OUT</span>`;

  function buildTopPlaysHTML(){
    const plays=[];

      for(const p of gd.players){
        if(p.injStatus?.toLowerCase().includes('out')) continue;

          plays.push({...pr,playerName:p.playerName,team:p.team,position:p.position,isHome:p.isHome,oppAbbr:p.oppTeamAbbr,game:gd.game});
        }

    if(!plays.length) return `<div class="top-plays-empty"><div class="tp-empty-icon">🎯</div><div class="tp-empty-msg">No 80+ confidence props found yet.</div><div class="tp-empty-sub">Sims need sufficient game log data.</div></div>`;

      const rc=p.sim.rec==='OVER'?'over':'under';

            ${evData?.ev!=null?`<div class="tp-ev" style="color:${evData.profitable?'#00d4aa':'#ff3d5a'};font-size:11px;font-weight:700">${evData.evStr}</div>`:''}
          </div>

  function gameLogTable(gameLog, line, statType, mf){
    if(!gameLog?.length) return `<div class="log-empty">No game log data available.</div>`;
    const lineF=parseFloat(line);
    const outlierMap={};
    (mf?.outliers||[]).forEach(o=>{ outlierMap[o.idx]=o.original; });
    const hits=gameLog.filter(g=>g.value>lineF).length;
    const hitPct=Math.round(hits/gameLog.length*100);
    const hitColor=hitPct>=60?'var(--teal)':hitPct<=40?'var(--red)':'var(--amber)';
    const hasOutliers=(mf?.outliers||[]).length>0;
    const rows=gameLog.map((g,i)=>{
      const isOut=outlierMap[i]!==undefined;
      const realVal=isOut?outlierMap[i]:g.value;
      const hit=realVal>lineF; const won=g.won;
      return `<tr class="log-row ${hit?'log-hit-row':'log-miss-row'}${isOut?' log-outlier-row':''}">
        <td class="log-game-num">${i+1}</td>
        <td class="log-date">${g.date}</td>
        <td class="log-opp">${g.isHome?'vs':'@'} ${g.opp}</td>
        <td class="log-min">${g.min}</td>
        <td class="log-score-result ${won?'log-win':'log-loss'}">${won===null?'—':won?'W':'L'} ${g.teamScore}-${g.oppScore}</td>
        <td class="log-stat-val ${hit?'hit-val':'miss-val'}">${isOut?`<span class="outlier-val">${realVal}</span><span class="outlier-arrow">→</span><span class="outlier-capped">${g.value.toFixed(1)}</span>`:realVal}</td>
        <td class="log-vs-line ${hit?'hit-vs':'miss-vs'}">${hit?'✓':'✗'}${isOut?'<span class="outlier-flag">⚠</span>':''}</td>
      </tr>`;
    }).join('');
    const outlierNote=hasOutliers?`<div class="outlier-note">⚠ <strong>${(mf.outliers||[]).length} outlier game(s) detected and capped</strong> — ${(mf.outliers||[]).map(o=>`Game ${o.idx+1}: ${o.original}→${o.capped} (IQR fence: ${mf.w10upper})`).join(', ')}. Raw avg: <strong>${mf.rawAvg10?.toFixed(1)||'?'}</strong> · Cleaned: <strong>${mf.avg10?.toFixed(1)||'?'}</strong>.</div>`:'';
    return `<div class="log-source-label">📊 REAL GAME DATA · BALLDONTLIE API · ${gameLog.length} GAMES (≥${MIN_PLAYED} MIN)${hasOutliers?' · ⚠ OUTLIER ADJUSTED':''}</div>
      ${outlierNote}
      <table class="game-log-table">
        <thead><tr><th>#</th><th>DATE</th><th>OPP</th><th>MIN</th><th>RESULT</th><th>${STAT_LABEL[statType].toUpperCase()}</th><th>LINE ${line}</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
      <div class="log-hit-summary"><span>Hit rate: <strong>${hits}/${gameLog.length} = ${hitPct}%</strong></span><span class="log-hit-bar" style="color:${hitColor}">${'█'.repeat(Math.round(hitPct/10))}${'░'.repeat(10-Math.round(hitPct/10))}</span><span style="color:${hitColor};font-weight:700">${hitPct>=60?'🔥 HOT':hitPct<=40?'❄️ COLD':'→ NEUTRAL'}</span></div>`;
  }

  function gameCard(gd, cardIdx){
    const {game:g,players,odds,gameSim}=gd;
    const hWin=gameSim?.hWin||50, aWin=gameSim?.aWin||50;
    const projH=gameSim?.projH||'—', projA=gameSim?.projA||'—';
    const overPct=gameSim?.overPct||50;
    const spread=odds?.spread_home_value, spreadF=spread?parseFloat(spread):0;
    const spreadStr=spread?(spreadF>0?`+${spread}`:String(spread)):'—';
    const total=odds?.total_value||'—', mlHome=odds?.moneyline_home_odds, mlAway=odds?.moneyline_away_odds;
    const bestProps=players.flatMap(p=>p.propResults.filter(pr=>pr.hasLine&&pr.sim.rec!=='PUSH'&&pr.sim.conf>=65).map(pr=>({...pr,playerName:p.playerName,team:p.team,playerData:p}))).sort((a,b)=>b.sim.conf-a.sim.conf);
    const topProp=bestProps[0];
    const homeInj=injuries.filter(i=>(injTeamId(i)===g.home_team.id)&&i.status?.toLowerCase().includes('out')).length;
    const awayInj=injuries.filter(i=>(injTeamId(i)===g.visitor_team.id)&&i.status?.toLowerCase().includes('out')).length;
    const tags=[];
    if(spread) tags.push(`<span class="tag tag-spread">${g.home_team.abbreviation} ${spreadStr}</span>`);
    if(total!=='—') tags.push(`<span class="tag tag-total">O/U ${total}</span>`);
    if(overPct>54) tags.push(`<span class="tag tag-over">📈 OVER ${overPct}%</span>`);
    else if(overPct<46) tags.push(`<span class="tag tag-under">📉 UNDER ${100-overPct}%</span>`);
    if(homeInj>0) tags.push(`<span class="tag tag-inj">⚠ ${g.home_team.abbreviation} injuries</span>`);
    if(awayInj>0) tags.push(`<span class="tag tag-inj">⚠ ${g.visitor_team.abbreviation} injuries</span>`);
    const betClass=topProp?(topProp.sim.rec==='OVER'?'bet-over':'bet-under'):'';

    // Referee panel HTML

    })();

    const simPanel=`<div class="sim-block"><div class="sim-score-row"><div class="sim-team"><div class="sim-abbr">${g.visitor_team.abbreviation}</div><div class="sim-score away-color">${projA}</div><div class="sim-wpct">${aWin}% WIN</div></div><div class="sim-vs">vs</div><div class="sim-team"><div class="sim-abbr">${g.home_team.abbreviation}</div><div class="sim-score home-color">${projH}</div><div class="sim-wpct">${hWin}% WIN</div></div></div><div class="sim-bar-wrap"><div class="sim-bar-away" style="width:${aWin}%"></div><div class="sim-bar-home" style="width:${hWin}%"></div></div><div class="sim-grid"><div class="sim-stat"><div class="ss-lbl">PROJ TOTAL</div><div class="ss-val">${typeof projH==='number'?projH+projA:'—'}</div></div><div class="sim-stat"><div class="ss-lbl">O/U LINE</div><div class="ss-val">${total}</div></div><div class="sim-stat"><div class="ss-lbl">OVER %</div><div class="ss-val ${overPct>52?'teal-color':overPct<48?'red-color':'mid-color'}">${overPct}%</div></div><div class="sim-stat"><div class="ss-lbl">SPREAD</div><div class="ss-val">${g.home_team.abbreviation} ${spreadStr}</div></div><div class="sim-stat"><div class="ss-lbl">SIMS</div><div class="ss-val">${N_SIMS.toLocaleString()}</div></div><div class="sim-stat"><div class="ss-lbl">MODEL</div><div class="ss-val" style="font-size:10px">12-FACTOR</div></div></div><div class="sim-note">17 factors: H2H · Return-from-Injury · Opp Fatigue · Real Usage% · Recent Opp D · Multi-Book Consensus · Full Season Log · Rest/Fatigue · Blowout · Game Total · Positional D · Sched · H/A · Per-36 · Streak · Corr · EV</div></div>`;
    return `<div class="game-card"><div class="card-inner">
      <div class="matchup-header">
        <div class="team-block"><div class="team-abbr">${g.visitor_team.abbreviation}</div><div class="team-city">${g.visitor_team.city}</div>${awayInj?`<span class="inj-flag">Injuries</span>`:''}</div>
        <div class="matchup-center"><div class="matchup-at">@</div></div>
        <div class="team-block"><div class="team-abbr">${g.home_team.abbreviation}</div><div class="team-city">${g.home_team.city}</div>${homeInj?`<span class="inj-flag">Injuries</span>`:''}</div>
      </div>
      <div class="prob-row"><span class="prob-pct away-color">${aWin}%</span><div class="prob-bar"><div class="prob-away" style="width:${aWin}%"></div><div class="prob-home" style="width:${hWin}%"></div></div><span class="prob-pct home-color">${hWin}%</span></div>
      <div class="tags-row">${tags.join('')}</div>
      ${topProp?`<div class="bet-summary-row"><span class="bet-summary-label ${betClass}">${topProp.sim.rec}: ${STAT_LABEL[topProp.statType]} ${topProp.line}</span><span class="proj-score">${projA}–${projH} ${hWin>aWin?'▼':'▲'}</span></div>`:''}
      <div class="tabs-strip" id="tabs-${cardIdx}">
        <button class="tab-btn active" onclick="switchTab(${cardIdx},0,this)">Lines &amp; Best Bet</button>
        <button class="tab-btn" onclick="switchTab(${cardIdx},1,this)">Player Props</button>

  }

  // gameCardInner: the inner content of a game card (used in game detail pages)
  function gameCardInner(gd, cardIdx){
    // refAssignments is defined in the outer buildHTML scope
    const {game:g,players,odds,gameSim}=gd;
    const hWin=gameSim?.hWin||50, aWin=gameSim?.aWin||50;
    const projH=gameSim?.projH||'—', projA=gameSim?.projA||'—';
    const overPct=gameSim?.overPct||50;
    const spread=odds?.spread_home_value, spreadF=spread?parseFloat(spread):0;
    const spreadStr=spread?(spreadF>0?`+${spread}`:String(spread)):'—';
    const total=odds?.total_value||'—', mlHome=odds?.moneyline_home_odds, mlAway=odds?.moneyline_away_odds;
    const bestProps=players.flatMap(p=>p.propResults.filter(pr=>pr.hasLine&&pr.sim.rec!=='PUSH'&&pr.sim.conf>=65).map(pr=>({...pr,playerName:p.playerName,team:p.team,playerData:p}))).sort((a,b)=>b.sim.conf-a.sim.conf);
    const topProp=bestProps[0];
    const homeInj=injuries.filter(i=>(injTeamId(i)===g.home_team.id)&&i.status?.toLowerCase().includes('out')).length;
    const awayInj=injuries.filter(i=>(injTeamId(i)===g.visitor_team.id)&&i.status?.toLowerCase().includes('out')).length;
    const tags=[];
    if(spread) tags.push(`<span class="tag tag-spread">${g.home_team.abbreviation} ${spreadStr}</span>`);
    if(total!=='—') tags.push(`<span class="tag tag-total">O/U ${total}</span>`);
    if(overPct>54) tags.push(`<span class="tag tag-over">📈 OVER ${overPct}%</span>`);
    else if(overPct<46) tags.push(`<span class="tag tag-under">📉 UNDER ${100-overPct}%</span>`);
    if(homeInj>0) tags.push(`<span class="tag tag-inj">⚠ ${g.home_team.abbreviation} injuries</span>`);
    if(awayInj>0) tags.push(`<span class="tag tag-inj">⚠ ${g.visitor_team.abbreviation} injuries</span>`);
    const betClass=topProp?(topProp.sim.rec==='OVER'?'bet-over':'bet-under'):'';
    const oddsPanel=odds?`<table class="odds-table"><thead><tr><th>Book</th><th>${g.visitor_team.abbreviation} ML</th><th>${g.home_team.abbreviation} ML</th><th>Spread</th><th>Total</th></tr></thead><tbody><tr><td><span class="book-badge book-fd">FD</span></td><td>${fmtOdds(mlAway)}</td><td>${fmtOdds(mlHome)}</td><td>${g.home_team.abbreviation} ${spreadStr}</td><td>O/U ${total}</td></tr></tbody></table>`:`<div class="no-data">No odds data yet.</div>`;
    const recBet=topProp?`<div class="rec-bet-card"><div class="rec-bet-header"><div class="rec-bet-label ${betClass}">${topProp.sim.rec}: ${STAT_LABEL[topProp.statType]} ${topProp.line}</div><div class="top-pick-badge">⭐ Top pick</div></div><div class="rec-bet-body">${topProp.sim.proj} projected vs ${topProp.line} line · ${topProp.sim.rec==='OVER'?topProp.sim.overPct:topProp.sim.underPct}% sim probability · conf ${topProp.sim.conf}/100${topProp.sim.ev?.ev!=null?' · EV '+topProp.sim.ev.evStr:''}</div><div class="rec-bet-footer"><span class="rec-conf">${topProp.sim.conf}/100</span><span class="rec-edge ${topProp.sim.edge>0?'edge-pos':'edge-neg'}">${topProp.sim.edge>0?'+':''}${topProp.sim.edge} edge</span><span class="book-badge book-fd">FD</span></div></div>`:`<div class="no-data">No high-confidence picks yet.</div>`;
    const simPanel=`<div class="sim-block"><div class="sim-score-row"><div class="sim-team"><div class="sim-abbr">${g.visitor_team.abbreviation}</div><div class="sim-score away-color">${projA}</div><div class="sim-wpct">${aWin}% WIN</div></div><div class="sim-vs">vs</div><div class="sim-team"><div class="sim-abbr">${g.home_team.abbreviation}</div><div class="sim-score home-color">${projH}</div><div class="sim-wpct">${hWin}% WIN</div></div></div><div class="sim-bar-wrap"><div class="sim-bar-away" style="width:${aWin}%"></div><div class="sim-bar-home" style="width:${hWin}%"></div></div><div class="sim-grid"><div class="sim-stat"><div class="ss-lbl">PROJ TOTAL</div><div class="ss-val">${typeof projH==='number'?projH+projA:'—'}</div></div><div class="sim-stat"><div class="ss-lbl">O/U LINE</div><div class="ss-val">${total}</div></div><div class="sim-stat"><div class="ss-lbl">OVER %</div><div class="ss-val ${overPct>52?'teal-color':overPct<48?'red-color':'mid-color'}">${overPct}%</div></div><div class="sim-stat"><div class="ss-lbl">SPREAD</div><div class="ss-val">${g.home_team.abbreviation} ${spreadStr}</div></div><div class="sim-stat"><div class="ss-lbl">SIMS</div><div class="ss-val">${N_SIMS.toLocaleString()}</div></div><div class="sim-stat"><div class="ss-lbl">MODEL</div><div class="ss-val" style="font-size:10px">17-FACTOR</div></div></div><div class="sim-note">17 factors: H2H · Return-from-Injury · Opp Fatigue · Real Usage% · Recent Opp D · Multi-Book Consensus · Full Season Log · Rest/Fatigue · Blowout · Game Total · Positional D · Sched · H/A · Per-36 · Streak · Corr · EV</div></div>`;
    return `
      <div class="matchup-header">
        <div class="team-block"><div class="team-abbr">${g.visitor_team.abbreviation}</div><div class="team-city">${g.visitor_team.city}</div>${awayInj?`<span class="inj-flag">Injuries</span>`:''}</div>
        <div class="matchup-center"><div class="matchup-at">@</div></div>
        <div class="team-block"><div class="team-abbr">${g.home_team.abbreviation}</div><div class="team-city">${g.home_team.city}</div>${homeInj?`<span class="inj-flag">Injuries</span>`:''}</div>
      </div>
      <div class="prob-row"><span class="prob-pct away-color">${aWin}%</span><div class="prob-bar"><div class="prob-away" style="width:${aWin}%"></div><div class="prob-home" style="width:${hWin}%"></div></div><span class="prob-pct home-color">${hWin}%</span></div>
      <div class="tags-row">${tags.join('')}</div>
      ${topProp?`<div class="bet-summary-row"><span class="bet-summary-label ${betClass}">${topProp.sim.rec}: ${STAT_LABEL[topProp.statType]} ${topProp.line}</span><span class="proj-score">${projA}–${projH} ${hWin>aWin?'▼':'▲'}</span></div>`:''}
      <div class="tabs-strip" id="tabs-${cardIdx}">
        <button class="tab-btn active" onclick="switchTab(${cardIdx},0,this)">Lines &amp; Best Bet</button>
        <button class="tab-btn" onclick="switchTab(${cardIdx},1,this)">Player Props</button>
        <button class="tab-btn" onclick="switchTab(${cardIdx},2,this)">Sim Breakdown</button>
        <button class="tab-btn" onclick="switchTab(${cardIdx},3,this)">Sharp Action</button>
      </div>
      <div class="tab-panel active" id="panel-${cardIdx}-0">
        <div class="panel-section">${oddsPanel}</div>
        <div class="panel-section"><div class="panel-title">Recommended bet</div>${recBet}</div>
        ${bestProps.slice(1,4).map(bp=>`<div class="also-like"><div class="also-label ${bp.sim.rec==='OVER'?'over-color':'under-color'}">${bp.sim.rec}: ${STAT_LABEL[bp.statType]} ${bp.line}</div><div class="also-sub">${bp.playerName} · proj ${bp.sim.proj} · ${bp.sim.rec==='OVER'?bp.sim.overPct:bp.sim.underPct}% · conf ${bp.sim.conf}${bp.sim.ev?.profitable?' · +EV':''}</div></div>`).join('')}
      </div>
      <div class="tab-panel" id="panel-${cardIdx}-1">
        <table class="props-table"><thead><tr><th>Player</th><th>PTS</th><th>REB</th><th>AST</th><th>3PM</th><th>STL</th><th>BLK</th><th>CONF</th></tr></thead>
        <tbody>${players.map(p=>propRow(p,cardIdx)).join('')}</tbody></table>
      </div>
      <div class="tab-panel" id="panel-${cardIdx}-2">${simPanel}</div>
      <div class="tab-panel" id="panel-${cardIdx}-3">${sharpActionHTML(g,cardIdx)}</div>`;
  }

  const topPlaysHTML=buildTopPlaysHTML();

  // Build all props flat list + separate prop logs (kept separate to reduce JSON size)
  const allPropsFlat = [];
  const propLogMap = {};
  for (const gd of Object.values(gameData)) {
    for (const p of gd.players) {
      if (p.injStatus?.toLowerCase().includes('out')) continue;
      for (const pr of p.propResults) {
        if (!pr.hasLine || pr.sim.rec === 'PUSH') continue;
        const hits10 = pr.gameLog.slice(0,10).filter(g=>g.value>parseFloat(pr.line)).length;
        const games10 = Math.min(pr.gameLog.length,10);
        const hits20 = pr.gameLog.slice(0,20).filter(g=>g.value>parseFloat(pr.line)).length;
        const games20 = Math.min(pr.gameLog.length,20);
        const ppNorm = p.playerName.toLowerCase().replace(/[^a-z]/g,'') + '_' + pr.statType;
        const ppLine = ppLines[ppNorm] || null;
        const allBookEntries = (propsByGame[gd.game.id]||[])
          .filter(bk => bk.player_id===p.pid && bk.prop_type===pr.statType && bk.market?.type==='over_under');
        const bookLines = [...new Set(allBookEntries.map(bk=>parseFloat(bk.line_value)).filter(v=>!isNaN(v)))].sort((a,b)=>a-b);
        const lineMovement = bookLines.length >= 2 ? {
          lo: bookLines[0], hi: bookLines[bookLines.length-1],
          range: parseFloat((bookLines[bookLines.length-1]-bookLines[0]).toFixed(1)),
        } : null;
        // Logs stored separately — NOT in allPropsFlat — to keep JSON small
        const logKey = p.pid + '_' + pr.statType;
        propLogMap[logKey] = pr.gameLog.slice(0,10).map(g=>({
          v: g.value, d: (g.date||'').slice(5), o: g.opp||'', h: g.isHome?1:0
        }));
        allPropsFlat.push({
          idx: allPropsFlat.length,
          pid: p.pid, playerName: p.playerName, team: p.team,
          gameId: String(gd.game.id),
          gameLabel: `${gd.game.visitor_team.abbreviation}@${gd.game.home_team.abbreviation}`,
          statType: pr.statType, line: pr.line, proj: pr.sim.proj,
          rec: pr.sim.rec, conf: pr.sim.conf, edge: pr.sim.edge,
          l10pct: games10 ? Math.round(hits10/games10*100) : 0,
          l20pct: games20 ? Math.round(hits20/games20*100) : 0,
          overPct: pr.sim.overPct,
          evProfitable: pr.sim.ev?.profitable||false,
          evStr: pr.sim.ev?.evStr||'N/A',
          ppLine, lineMovement,
        });
      }
    }
  }
  const allPropsJSON = JSON.stringify(allPropsFlat);
  const propLogJSON  = JSON.stringify(propLogMap);
  const refTableJSON = JSON.stringify(REF_FOUL_TABLE);

  // Build injury page
  function buildInjuryPageHTML() {
    const secs = [];
    const allOut = [...outPlayers, ...inferredOut.filter(i=>!outPlayers.find(o=>o.player?.id===i.player?.id))];
    if (allOut.length) {
      secs.push(`<div class="inj-section-title">⛔ OUT</div>`);
      allOut.forEach(i => {
        const inferred = i.source==='inferred';
        secs.push(`<div class="inj-card ${inferred?'inj-inferred':'inj-out'}">
          <div class="inj-card-name">${i.player?.first_name||''} ${i.player?.last_name||'?'}</div>
          <div class="inj-card-meta">${injTeamAbbr(i)} · ${i.player?.position||'?'}</div>
          <div class="inj-card-status">${i.status||'OUT'}${inferred?' (inferred)':''}</div>
          ${(i.description||i._note)?`<div class="inj-card-desc">${i.description||i._note||''}</div>`:''}
          ${inferred?`<div class="inj-card-desc">Missed ${i._missedGames} team games since ${i._lastPlayed}</div>`:''}
        </div>`);
      });
    }
    if (qPlayers.length) {
      secs.push(`<div class="inj-section-title" style="margin-top:16px;color:var(--orange)">⚠ QUESTIONABLE / GTD</div>`);
      qPlayers.forEach(i => secs.push(`<div class="inj-card inj-q">
        <div class="inj-card-name">${i.player?.first_name||''} ${i.player?.last_name||'?'}</div>
        <div class="inj-card-meta">${injTeamAbbr(i)} · ${i.player?.position||'?'}</div>
        <div class="inj-card-status">${i.status||'Q'}</div>
        ${i.description?`<div class="inj-card-desc">${i.description}</div>`:''}
      </div>`));
    }
    if (staleCleared.length) {
      secs.push(`<div class="inj-section-title" style="margin-top:16px;color:var(--teal)">✓ CLEARED (played recently)</div>`);
      staleCleared.forEach(i => secs.push(`<div class="inj-card inj-cleared">
        <div class="inj-card-name">${i.player?.first_name||''} ${i.player?.last_name||'?'}</div>
        <div class="inj-card-meta">${injTeamAbbr(i)}</div>
        <div class="inj-card-status" style="color:var(--teal)">Active — API report stale</div>
        ${i._note?`<div class="inj-card-desc">${i._note}</div>`:''}
      </div>`));
    }
    if (!secs.length) return `<div class="no-data" style="padding:40px;text-align:center">No injury reports for today's slate.</div>`;
    return `<div class="inj-page">${secs.join('')}</div>`;
  }

  const _html = `<!DOCTYPE html><html lang="en"><head>

.tp-section-sub{font-size:10px;color:var(--dim);}
.top-play-card{background:var(--card);border-radius:10px;margin-bottom:10px;padding:14px;display:flex;gap:12px;border:1px solid var(--border);}
.tp-rank{font-size:28px;font-weight:800;color:var(--faint);min-width:32px;padding-top:2px;}
.tp-main{flex:1;}
.tp-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px;}
.tp-player{font-size:15px;font-weight:700;}
.tp-team{font-size:10px;color:var(--mid);font-weight:400;}
.tp-stars{font-size:13px;letter-spacing:1px;flex-shrink:0;}
.tp-body{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap;}
.tp-stat-label{font-size:11px;font-weight:700;letter-spacing:1px;color:var(--mid);text-transform:uppercase;}
.tp-proj-big{font-size:36px;font-weight:800;}
.tp-vs-line{font-size:13px;color:var(--dim);}
.tp-call-pill{font-size:12px;font-weight:700;padding:4px 12px;border-radius:100px;}
.tp-ev{margin-top:2px;font-size:11px;font-weight:700;}
.tp-metrics{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px;}
.tp-metric{display:flex;flex-direction:column;align-items:center;background:var(--faint);border-radius:6px;padding:5px 8px;min-width:44px;}
.tp-metric-lbl{font-size:8px;color:var(--dim);letter-spacing:1px;text-transform:uppercase;}
.tp-metric-val{font-size:14px;font-weight:700;}
.tp-log{display:flex;gap:4px;flex-wrap:wrap;}
.tp-log-val{font-size:13px;font-weight:700;padding:3px 6px;border-radius:4px;min-width:30px;text-align:center;}
.tp-hit{background:var(--teal-dim);color:var(--teal);}
.tp-miss{background:var(--red-dim);color:var(--red);}
.top-plays-empty{padding:32px 16px;text-align:center;}
.tp-empty-icon{font-size:36px;margin-bottom:8px;}
.tp-empty-msg{font-size:14px;font-weight:600;color:var(--mid);}
.tp-empty-sub{font-size:12px;color:var(--dim);margin-top:4px;}
/* GAMES LIST */
.games-page{padding:12px;}
.games-header{font-size:18px;font-weight:800;letter-spacing:2px;padding:12px 0 8px;}
.game-btn{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:10px;width:100%;text-align:left;cursor:pointer;display:flex;align-items:center;gap:12px;}
.game-btn:active{background:var(--card2);}
.gbt-left{flex:1;}
.gbt-matchup{font-size:18px;font-weight:800;color:var(--text);letter-spacing:1px;}
.gbt-meta{font-size:11px;color:var(--mid);margin-top:3px;}
.gbt-bar-row{display:flex;align-items:center;gap:6px;margin-top:6px;}
.gbt-bar{flex:1;height:4px;border-radius:2px;overflow:hidden;background:var(--faint);display:flex;}
.gbt-away{background:var(--orange);}
.gbt-home{background:var(--blue);}
.gbt-right{text-align:right;flex-shrink:0;}
.gbt-total{font-size:11px;color:var(--mid);}
.gbt-spread{font-size:13px;font-weight:700;color:var(--blue);margin-top:2px;}
.gbt-arrow{font-size:18px;color:var(--dim);}
/* GAME DETAIL */
.game-detail{display:none;}
.game-detail.active{display:block;}
.gd-back{display:flex;align-items:center;gap:8px;padding:12px 16px;background:var(--bg);border-bottom:1px solid var(--border);cursor:pointer;position:sticky;top:56px;z-index:100;}
.gd-back-icon{font-size:18px;color:var(--teal);}
.gd-back-lbl{font-size:13px;font-weight:600;color:var(--teal);}
/* ALL PROPS */
.all-props-page{padding:12px;}
.props-filters{background:var(--card2);border-radius:10px;padding:12px;margin-bottom:10px;}
.filter-row{display:flex;gap:8px;align-items:center;margin-bottom:8px;}
.filter-row:last-child{margin-bottom:0;}
.filter-lbl{font-size:9px;font-weight:700;letter-spacing:1px;color:var(--dim);text-transform:uppercase;min-width:34px;}
.fsel{flex:1;background:var(--faint);border:1px solid var(--border);border-radius:6px;padding:7px 10px;font-size:12px;color:var(--text);}
.fsel option{background:var(--card);}
.sort-btns{display:flex;gap:5px;flex-wrap:wrap;flex:1;}
.srt-btn{background:var(--faint);border:1px solid var(--border);border-radius:6px;padding:5px 10px;font-size:10px;font-weight:700;letter-spacing:.5px;color:var(--dim);cursor:pointer;text-transform:uppercase;}
.srt-btn.active{background:var(--teal-dim);border-color:var(--teal);color:var(--teal);}
.props-count{font-size:11px;color:var(--dim);margin-bottom:8px;}
.prc{background:var(--card);border-radius:8px;padding:12px;margin-bottom:8px;border:1px solid var(--border);}
.prc-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px;}
.prc-player{font-size:14px;font-weight:700;color:var(--text);}
.prc-game-lbl{font-size:10px;color:var(--dim);margin-top:2px;}
.prc-stat-block{text-align:right;flex-shrink:0;}
.prc-stat{font-size:11px;font-weight:700;letter-spacing:1px;color:var(--amber);text-transform:uppercase;}
.prc-rec{display:inline-block;font-size:12px;font-weight:700;padding:3px 10px;border-radius:100px;margin-top:3px;}
.prc-chips{display:flex;gap:5px;flex-wrap:wrap;}
.prc-chip{background:var(--faint);border-radius:5px;padding:4px 8px;display:flex;flex-direction:column;align-items:center;min-width:46px;}
.prc-cl{font-size:8px;color:var(--dim);letter-spacing:.8px;text-transform:uppercase;}
.prc-cv{font-size:13px;font-weight:700;}
/* INJURIES */
.inj-page{padding:12px;}
.inj-section-title{font-size:11px;font-weight:700;letter-spacing:1.5px;color:var(--red);text-transform:uppercase;padding:8px 0 6px;}
.inj-card{background:var(--card);border-radius:8px;padding:12px;margin-bottom:8px;border-left:3px solid var(--red);}
.inj-inferred{border-left-color:var(--amber);}
.inj-q{border-left-color:var(--orange);}
.inj-cleared{border-left-color:var(--teal);}
.inj-card-name{font-size:14px;font-weight:700;color:var(--text);}
.inj-card-meta{font-size:11px;color:var(--mid);margin-top:2px;}
.inj-card-status{font-size:12px;font-weight:600;color:var(--red);margin-top:4px;}
.inj-q .inj-card-status{color:var(--orange);}
.inj-inferred .inj-card-status{color:var(--amber);}
.inj-card-desc{font-size:11px;color:var(--dim);margin-top:4px;line-height:1.5;}
/* GAME CARD INTERNALS */
.matchup-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:var(--card2);}
.team-block{display:flex;flex-direction:column;align-items:center;flex:1;gap:3px;}
.team-abbr{font-size:26px;font-weight:800;letter-spacing:2px;color:var(--text);}
.team-city{font-size:10px;color:var(--mid);letter-spacing:1px;text-transform:uppercase;}
.inj-flag{font-size:9px;background:rgba(255,61,90,.15);color:var(--red);border:1px solid var(--red);border-radius:100px;padding:1px 7px;margin-top:3px;}
.matchup-center{display:flex;align-items:center;padding:0 12px;}
.matchup-at{font-size:18px;font-weight:300;color:var(--dim);}
.prob-row{display:flex;align-items:center;gap:8px;padding:8px 14px;}
.prob-pct{font-size:13px;font-weight:700;min-width:36px;}
.prob-pct.away-color{color:var(--orange);}
.prob-pct.home-color{color:var(--blue);}
.prob-bar{flex:1;display:flex;height:6px;border-radius:3px;overflow:hidden;background:var(--faint);}
.prob-away{background:linear-gradient(90deg,var(--orange),rgba(255,112,64,.5));}
.prob-home{background:linear-gradient(90deg,rgba(79,163,255,.5),var(--blue));}
.away-color{color:var(--orange);}.home-color{color:var(--blue);}
.teal-color{color:var(--teal);}.red-color{color:var(--red);}.mid-color{color:var(--mid);}
.over-color{color:var(--teal);}.under-color{color:var(--red);}
.tags-row{display:flex;flex-wrap:wrap;gap:5px;padding:6px 14px;}
.tag{font-size:10px;padding:3px 9px;border-radius:100px;font-weight:500;}
.tag-spread{background:var(--blue-dim);color:var(--blue);}
.tag-total{background:var(--faint);color:var(--mid);}
.tag-over{background:var(--teal-dim);color:var(--teal);}
.tag-under{background:var(--red-dim);color:var(--red);}
.tag-inj{background:rgba(255,112,64,.12);color:var(--orange);}
.bet-summary-row{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;border-top:1px solid var(--border);}
.bet-summary-label{font-size:13px;font-weight:700;padding:3px 10px;border-radius:6px;}
.bet-over{background:var(--teal-dim);color:var(--teal);}
.bet-under{background:var(--red-dim);color:var(--red);}
.proj-score{font-size:13px;font-weight:600;color:var(--mid);}
.tabs-strip{display:flex;border-top:1px solid var(--border);border-bottom:1px solid var(--border);background:var(--card2);overflow-x:auto;scrollbar-width:none;}
.tabs-strip::-webkit-scrollbar{display:none;}
.tab-btn{flex-shrink:0;padding:10px 14px;font-size:11px;font-weight:600;color:var(--dim);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;}
.tab-btn.active{color:var(--teal);border-bottom-color:var(--teal);}
.tab-panel{display:none;}.tab-panel.active{display:block;}
.panel-section{padding:14px 14px 0;}
.panel-title{font-size:11px;font-weight:700;letter-spacing:1.5px;color:var(--mid);text-transform:uppercase;margin-bottom:10px;}
.odds-table{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:14px;}
.odds-table th{padding:6px 8px;text-align:left;color:var(--dim);font-size:10px;letter-spacing:1px;text-transform:uppercase;border-bottom:1px solid var(--border);}
.odds-table td{padding:8px;border-bottom:1px solid var(--faint);color:var(--text);}
.book-badge{display:inline-block;font-size:10px;font-weight:800;padding:2px 6px;border-radius:4px;letter-spacing:.5px;}
.book-fd{background:#003d30;color:#00d4aa;}
.no-data{font-size:12px;color:var(--dim);padding:14px;text-align:center;}
.rec-bet-card{background:var(--card2);border-radius:10px;border:1px solid var(--border);padding:14px;margin-bottom:10px;}
.rec-bet-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.rec-bet-label{font-size:14px;font-weight:700;padding:4px 12px;border-radius:6px;}
.top-pick-badge{background:var(--amber-dim);color:var(--amber);font-size:11px;font-weight:600;padding:3px 10px;border-radius:100px;border:1px solid var(--amber);}
.rec-bet-body{font-size:13px;color:var(--mid);line-height:1.5;margin-bottom:8px;}
.rec-bet-footer{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
.rec-conf{font-size:11px;color:var(--teal);font-weight:600;}
.rec-edge{font-size:11px;font-weight:600;}
.edge-pos{color:var(--teal);}.edge-neg{color:var(--red);}
.also-like{padding:8px 14px;border-top:1px solid var(--faint);}
.also-label{font-size:12px;font-weight:600;}
.also-sub{font-size:11px;color:var(--dim);margin-top:1px;}
.props-table{width:100%;border-collapse:collapse;font-size:12px;}
.props-table thead th{padding:8px 6px;text-align:center;color:var(--dim);font-size:10px;letter-spacing:1px;border-bottom:1px solid var(--border);background:var(--card2);}
.props-table thead th:first-child{text-align:left;padding-left:12px;}
.player-row{cursor:pointer;border-bottom:1px solid var(--faint);}
.player-name-cell{padding:10px 12px;}
.player-name{font-size:13px;font-weight:600;color:var(--text);}
.player-meta{font-size:10px;color:var(--mid);margin-top:1px;}
.prop-cell{text-align:center;padding:8px 4px;vertical-align:middle;}
.prop-proj{font-size:14px;font-weight:700;}
.prop-line{font-size:10px;color:var(--dim);margin-top:1px;}
.prop-conf-bar{height:3px;background:var(--faint);border-radius:2px;margin:3px auto;width:80%;}
.prop-conf-fill{height:100%;border-radius:2px;}
.prop-conf-fill.conf-over{background:var(--teal);}
.prop-conf-fill.conf-under{background:var(--red);}
.prop-conf-fill.conf-push{background:var(--dim);}
.prop-conf-num{font-size:10px;color:var(--dim);}
.prop-over .prop-proj{color:var(--teal);}
.prop-under .prop-proj{color:var(--red);}
.prop-push .prop-proj{color:var(--mid);}
.prop-na{color:var(--faint);text-align:center;font-size:12px;}
.conf-cell{text-align:center;font-weight:700;font-size:14px;padding:8px 6px;}
.conf-color-hi{color:var(--teal);}.conf-color-md{color:var(--amber);}.conf-color-lo{color:var(--dim);}
.player-detail-row td{padding:0;background:var(--bg);}
.player-detail{padding:12px;}
.detail-prop-block{background:var(--card);border-radius:8px;padding:12px;margin-bottom:10px;border:1px solid var(--border);}
.detail-prop-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.detail-prop-type{font-size:13px;font-weight:700;color:var(--amber);letter-spacing:1px;text-transform:uppercase;}
.detail-line{font-size:12px;color:var(--dim);}
.fd-badge{background:var(--teal-dim);color:var(--teal);font-size:9px;padding:1px 5px;border-radius:3px;font-weight:700;}
.detail-proj-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
.detail-big-num{font-size:38px;font-weight:800;}
.push-color{color:var(--mid);}.dim-color{color:var(--dim);}
.detail-vs{font-size:16px;color:var(--faint);}
.detail-call-pill{font-size:12px;font-weight:700;padding:4px 12px;border-radius:100px;}
.over-pill{background:var(--teal-dim);color:var(--teal);}
.under-pill{background:var(--red-dim);color:var(--red);}
.push-pill{background:var(--faint);color:var(--mid);}
.detail-conf-pill{font-size:11px;color:var(--dim);border:1px solid var(--border);padding:3px 8px;border-radius:100px;}
.ev-pill{font-size:11px;font-weight:700;padding:3px 10px;border-radius:100px;}
.ev-pos{background:var(--teal-dim);color:var(--teal);}
.ev-neg{background:var(--red-dim);color:var(--red);}
.fd-odds-row{display:flex;align-items:center;gap:10px;padding:6px 0 10px;font-size:13px;border-bottom:1px solid var(--faint);margin-bottom:10px;}
.fd-over{color:var(--teal);font-weight:600;}.fd-under{color:var(--red);font-weight:600;}.fd-sep{color:var(--dim);}
.detail-avgs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
.avg-chip{background:var(--faint);border-radius:6px;padding:6px 8px;display:flex;flex-direction:column;align-items:center;gap:2px;min-width:52px;}
.avg-label{font-size:9px;color:var(--dim);letter-spacing:1px;font-weight:600;text-transform:uppercase;}
.avg-val{font-size:15px;font-weight:700;color:var(--text);}
.outlier-chip{border:1px solid rgba(255,182,39,.3);}
.outlier-raw{color:var(--amber);text-decoration:line-through;}
.model-factors-block{background:var(--card2);border-radius:8px;padding:12px;margin-bottom:10px;}
.mf-title{font-size:9px;font-weight:700;letter-spacing:1.5px;color:var(--dim);text-transform:uppercase;margin-bottom:10px;}
.mf-row{display:flex;align-items:center;gap:8px;margin-bottom:7px;}
.mf-row:last-child{margin-bottom:0;}
.mf-label{font-size:10px;color:var(--mid);min-width:80px;letter-spacing:.5px;}
.mf-bar-wrap{flex:1;height:6px;background:var(--faint);border-radius:3px;overflow:hidden;}
.mf-bar{height:100%;border-radius:3px;min-width:4px;}
.mf-val{font-size:10px;font-weight:600;min-width:130px;text-align:right;letter-spacing:.3px;}
/* ALT LINE */
.alt-scanner{background:var(--card2);border-radius:10px;padding:14px;margin:10px 0;border:1px solid var(--border);}
.alt-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px;}
.alt-title{font-size:12px;font-weight:700;letter-spacing:1.5px;color:var(--blue);text-transform:uppercase;}
.alt-subtitle{font-size:10px;color:var(--dim);}
.alt-table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;margin-bottom:8px;}
.alt-table{width:100%;border-collapse:collapse;font-size:12px;}
.alt-table thead th{padding:6px 8px;text-align:center;color:var(--dim);font-size:9px;letter-spacing:1px;text-transform:uppercase;border-bottom:1px solid var(--border);background:var(--faint);}
.alt-table thead th:first-child{text-align:left;}
.alt-row td{padding:7px 8px;border-bottom:1px solid var(--faint);vertical-align:middle;}
.alt-row:last-child td{border-bottom:none;}
.alt-main-row{background:rgba(255,182,39,.05);}
.alt-line-col{text-align:left;white-space:nowrap;min-width:70px;}
.alt-l10-col,.alt-l20-col{text-align:left;white-space:nowrap;}
.alt-blend-col{text-align:center;font-size:13px;}
.alt-rec-col{text-align:center;}
.alt-rec-pill{font-size:10px;font-weight:700;padding:2px 8px;border-radius:100px;}
.alt-main-badge{font-size:8px;font-weight:800;letter-spacing:1px;background:var(--amber-dim);color:var(--amber);border:1px solid var(--amber);border-radius:4px;padding:1px 5px;margin-right:5px;vertical-align:middle;}
.alt-diverge-note{font-size:10px;color:var(--amber);padding:6px 0 4px;}
.alt-disclaimer{font-size:10px;color:var(--dim);line-height:1.5;border-top:1px solid var(--faint);padding-top:8px;}
.alt-empty{font-size:12px;color:var(--dim);padding:12px;text-align:center;}
/* GAME LOG */
.log-source-label{font-size:9px;font-weight:700;letter-spacing:1.5px;color:var(--teal);text-transform:uppercase;padding:8px 0 6px;opacity:.7;}
.game-log-table{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:8px;}
.game-log-table thead th{padding:5px 6px;text-align:left;color:var(--dim);font-size:9px;letter-spacing:1px;text-transform:uppercase;border-bottom:1px solid var(--border);background:var(--card2);}
.game-log-table tbody tr{border-bottom:1px solid var(--faint);}
.log-row td{padding:7px 6px;vertical-align:middle;}
.log-hit-row{background:rgba(0,212,170,.04);}
.log-outlier-row{background:rgba(255,182,39,.05);}
.log-game-num{color:var(--dim);font-size:10px;min-width:16px;}
.log-date{color:var(--mid);font-size:11px;white-space:nowrap;}
.log-opp{color:var(--text);font-weight:600;font-size:12px;}
.log-min{color:var(--dim);font-size:10px;}
.log-score-result{font-size:10px;}
.log-win{color:var(--teal);}.log-loss{color:var(--red);}
.log-stat-val{font-size:16px;font-weight:800;text-align:right;}
.hit-val{color:var(--teal);}.miss-val{color:var(--red);}
.log-vs-line{font-size:14px;text-align:center;}
.hit-vs{color:var(--teal);}.miss-vs{color:var(--dim);}
.log-hit-summary{display:flex;justify-content:space-between;align-items:center;font-size:11px;color:var(--mid);padding:6px 0 10px;}
.log-hit-bar{font-family:monospace;font-size:12px;}
.log-empty{font-size:12px;color:var(--dim);padding:10px;text-align:center;}
.outlier-val{text-decoration:line-through;color:var(--dim);font-size:11px;}
.outlier-arrow{color:var(--dim);font-size:10px;margin:0 2px;}
.outlier-capped{color:var(--amber);font-weight:700;}
.outlier-flag{font-size:8px;color:var(--amber);margin-left:2px;}
.outlier-note{background:rgba(255,182,39,.08);border:1px solid rgba(255,182,39,.3);border-radius:6px;padding:8px 10px;margin-bottom:8px;font-size:11px;color:var(--mid);line-height:1.6;}
.outlier-note strong{color:var(--amber);}
/* NARRATIVE */
.narrative-block{margin-top:6px;}
.narr-section{background:var(--card2);border-radius:8px;padding:12px;margin-bottom:8px;border-left:2px solid var(--border);}
.narr-section.narr-sim-summary{border-left-color:var(--teal);}
.narr-title{font-size:9px;font-weight:700;letter-spacing:1.5px;color:var(--amber);text-transform:uppercase;margin-bottom:6px;}
.narr-body{font-size:12px;color:var(--mid);line-height:1.7;}
.narr-body strong{color:var(--text);}
.narr-body em{color:var(--dim);font-style:normal;}
.badge{display:inline-block;font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;margin-left:4px;vertical-align:middle;}
.badge-out{background:var(--red-dim);color:var(--red);}
.badge-q{background:rgba(255,112,64,.15);color:var(--orange);}
.lineup-badge{display:inline-block;font-size:8px;font-weight:700;padding:1px 5px;border-radius:3px;margin-left:4px;vertical-align:middle;letter-spacing:.5px;}
.lineup-badge.starter{background:rgba(0,212,170,.15);color:var(--teal);border:1px solid rgba(0,212,170,.3);}

// ─────────────────────────────────────────
//  PRIZEPICKS PUBLIC PROJECTIONS  [NEW v6]
//  No auth required — public partner API.
//  Returns { normName_statType → ppLine }
// ─────────────────────────────────────────
const PP_STAT_MAP = {
  'Points':'points','Rebounds':'rebounds','Assists':'assists',
  '3-PT Made':'threes','Blocked Shots':'blocks','Steals':'steals',
};

async function fetchPrizePicksLines() {
  const result = {};
  try {
    const ppCtrl = new AbortController();
    const ppTimer = setTimeout(() => ppCtrl.abort(), 12000);
    const ppRes = await fetch('https://partner-api.prizepicks.com/projections?league_id=7&per_page=500&single_stat=true', {
      headers: { 'Content-Type': 'application/json' },
      signal: ppCtrl.signal
    });
    clearTimeout(ppTimer);
    const data = await ppRes.json();

    // Build player name lookup from included
    const playerNames = {};
    for (const item of (data.included||[])) {
      if (item.type === 'new_player') {
        playerNames[item.id] = item.attributes?.display_name || '';
      }
    }

    for (const proj of (data.data||[])) {
      if (proj.type !== 'projection') continue;
      const statType = PP_STAT_MAP[proj.attributes?.stat_type];
      if (!statType) continue;
      const line = parseFloat(proj.attributes?.line_score);
      if (isNaN(line)) continue;
      const pName = playerNames[proj.relationships?.new_player?.data?.id]
                 || proj.attributes?.description || '';
      if (!pName) continue;
      // Normalize: strip non-alpha, lowercase  →  "lebronjames_points"
      const norm = pName.toLowerCase().replace(/[^a-z]/g,'') + '_' + statType;
      result[norm] = line;
    }
  } catch(e) { /* PP unavailable — non-critical */ }
  return result;
}

// ─────────────────────────────────────────
//  RECENT OPPONENT DEFENSE  [NEW v5.2]
//  Fetches last ~10 completed games per opponent team,
//  computes average points allowed, returns a per-team factor.
//  Season averages lag — this captures current defensive form.
// ─────────────────────────────────────────
async function fetchTeamRecentDefense(oppTeamIds, today) {
  const recentDef = {};
  const d30 = new Date(today + 'T12:00:00'); d30.setDate(d30.getDate() - 30);
  const startDate = d30.toISOString().split('T')[0];

  for (const teamId of [...new Set(oppTeamIds)]) {
    const r = await get(`/nba/v1/games?team_ids[]=${teamId}&start_date=${startDate}&end_date=${today}&per_page=15`);
    const completed = (r.data || []).filter(g =>
      g.status?.toLowerCase().includes('final') || (g.home_team_score > 0 && g.visitor_team_score > 0)
    );
    if (completed.length < 3) { recentDef[teamId] = null; continue; }

    const recent = completed.slice(-10);
    let totalAllowed = 0;
    for (const g of recent) {
      const isHome = g.home_team?.id === teamId || g.home_team_id === teamId;
      totalAllowed += isHome ? (g.visitor_team_score || 0) : (g.home_team_score || 0);
    }
    const avgAllowed = totalAllowed / recent.length;
    // Factor relative to league average pts per game
    const factor = Math.max(0.90, Math.min(1.10, avgAllowed / 114.5));
    recentDef[teamId] = { avgAllowed:parseFloat(avgAllowed.toFixed(1)), games:recent.length, factor:parseFloat(factor.toFixed(4)) };
  }
  return recentDef;
}

// ─────────────────────────────────────────
//  RECENT TEAM GAME TOTALS  [NEW v5.2]
//  Fetches actual game scores for each team's last 10-15 games.
//  Computes real recent avg points scored, allowed, and combined
//  total — far more accurate pace proxy than team pace ratings,
//  which lag behind current offensive/defensive trends.
// ─────────────────────────────────────────
async function fetchRecentTeamTotals(teamIds, today) {
  const teamTotals = {};
  const d35 = new Date(today + 'T12:00:00'); d35.setDate(d35.getDate() - 35);
  const startDate = d35.toISOString().split('T')[0];

  for (const teamId of [...new Set(teamIds)]) {
    const r = await get(`/nba/v1/games?team_ids[]=${teamId}&start_date=${startDate}&end_date=${today}&per_page=20`);
    const completed = (r.data || []).filter(g =>
      g.home_team_score > 0 && g.visitor_team_score > 0
    );
    if (completed.length < 3) { teamTotals[teamId] = null; continue; }

    const recent = completed.slice(-12);  // last 12 completed games
    let totalScored = 0, totalAllowed = 0, totalCombined = 0;
    for (const g of recent) {
      const isHome  = g.home_team?.id === teamId || g.home_team_id === teamId;
      const scored  = isHome ? (g.home_team_score  || 0) : (g.visitor_team_score || 0);
      const allowed = isHome ? (g.visitor_team_score || 0) : (g.home_team_score || 0);
      totalScored   += scored;
      totalAllowed  += allowed;
      totalCombined += scored + allowed;
    }
    const n = recent.length;
    teamTotals[teamId] = {
      avgScored:   parseFloat((totalScored   / n).toFixed(1)),
      avgAllowed:  parseFloat((totalAllowed  / n).toFixed(1)),
      avgCombined: parseFloat((totalCombined / n).toFixed(1)),
      games: n,
    };
  }
  return teamTotals;
}


//  Fetches real usage_percentage from BallDontLie advanced stats.
//  Batched per-player over last 30 days.
// ─────────────────────────────────────────
async function fetchPlayerAdvancedStats(pids) {
  const advStats = {};
  const today = new Date();
  const fmt   = d => d.toISOString().split('T')[0];
  const d30   = new Date(today); d30.setDate(today.getDate() - 30);
  const d60   = new Date(today); d60.setDate(today.getDate() - 60);

  for (let i = 0; i < pids.length; i += 5) {
    const batch = pids.slice(i, i + 5);
    const q     = batch.map(id => `player_ids[]=${id}`).join('&');
    const r     = await get(`/nba/v2/stats/advanced?${q}&per_page=100&start_date=${fmt(d30)}&end_date=${fmt(today)}`);
    for (const s of (r.data || [])) {
      const pid = s.player?.id;
      if (!pid || s.usage_percentage == null) continue;
      if (!advStats[pid]) advStats[pid] = { recent:[], season:[] };
      advStats[pid].recent.push(s.usage_percentage);
    }
    // Season average for context — slightly wider window
    const r2 = await get(`/nba/v2/stats/advanced?${q}&per_page=100&start_date=${fmt(d60)}&end_date=${fmt(today)}`);
    for (const s of (r2.data || [])) {
      const pid = s.player?.id;
      if (!pid || s.usage_percentage == null) continue;
      if (!advStats[pid]) advStats[pid] = { recent:[], season:[] };
      advStats[pid].season.push(s.usage_percentage);
    }
  }

  const result = {};
  for (const [pidStr, data] of Object.entries(advStats)) {
    const pid = +pidStr;
    if (!data.recent.length) continue;
    result[pid] = {
      recentUsagePct: data.recent.reduce((a,b)=>a+b,0) / data.recent.length,
      seasonUsagePct: data.season.length
        ? data.season.reduce((a,b)=>a+b,0) / data.season.length
        : data.recent.reduce((a,b)=>a+b,0) / data.recent.length,
    };
  }
  return result;
}

// ─────────────────────────────────────────
//  HEAD-TO-HEAD PACE ADJUSTMENT  [NEW v5.2]
//  For each game, fetches past meetings this season and
//  computes their average combined total. Some matchups
//  consistently play faster/slower than team averages suggest.
// ─────────────────────────────────────────
async function fetchHeadToHeadAdjustments(games) {
  const h2h = {};
  for (const g of games) {
    const homeId = g.home_team.id, awayId = g.visitor_team.id;
    const r = await get(`/nba/v1/games?team_ids[]=${homeId}&team_ids[]=${awayId}&seasons[]=${SEASON}&per_page=10`);
    const meetings = (r.data || []).filter(gm =>
      gm.id !== g.id &&
      (gm.status?.toLowerCase().includes('final') || (gm.home_team_score > 0 && gm.visitor_team_score > 0))
    );
    const totals = meetings.map(gm => (gm.home_team_score||0) + (gm.visitor_team_score||0)).filter(t => t > 150);
    if (totals.length < 2) { h2h[g.id] = null; continue; }
    const avgTotal = totals.reduce((a,b)=>a+b,0) / totals.length;
    h2h[g.id] = { avgTotal:parseFloat(avgTotal.toFixed(1)), games:totals.length };
  }
  return h2h;
}

// ─────────────────────────────────────────
//  HEAD-TO-HEAD PLAYER STATS  [NEW v5.3]
//
//  For each player, fetches their historical stats specifically
//  against tonight's opponent — both current season (from rawStats)
//  and prior seasons (dedicated fetch).
//
//  This is alpha the market systematically under-prices:
//  a player who averages 31 pts vs GSW vs their 24-pt average is
//  exploiting a real matchup edge, not noise.
// ─────────────────────────────────────────
async function fetchPlayerH2HStats(rankedPids, rawStats, playerGameMap) {
  const h2hStats = {}; // pid → { current: statRows[], prior: statRows[] }

  for (const pid of rankedPids) {
    const info = playerGameMap[pid];
    if (!info?.oppTeamId) continue;

    // Current season H2H — derive from rawStats (already fetched, no extra call)
    const currentRows = (rawStats[pid] || []).filter(s => {
      if (s._priorSeason) return false;
      const g = s.game || {};
      const homeId = g.home_team?.id || g.home_team_id;
      const awayId = g.visitor_team?.id || g.visitor_team_id;
      return homeId === info.oppTeamId || awayId === info.oppTeamId;
    });

    // Prior season H2H — dedicated fetch to get full history
    const priorRows = [];
    for (const season of [SEASON - 1, SEASON - 2]) {
      const r = await get(`/nba/v1/stats?player_ids[]=${pid}&seasons[]=${season}&per_page=100`);
      const filtered = (r.data || []).filter(s => {
        if (parseMins(s.min) < MIN_PLAYED) return false;
        const g = s.game || {};
        const homeId = g.home_team?.id || g.home_team_id;
        const awayId = g.visitor_team?.id || g.visitor_team_id;
        return homeId === info.oppTeamId || awayId === info.oppTeamId;
      });
      priorRows.push(...filtered);
      if (priorRows.length >= 8) break; // Enough H2H history
    }

    const allH2H = [...currentRows, ...priorRows]
      .sort((a,b) => (b.game?.date||'').slice(0,10).localeCompare((a.game?.date||'').slice(0,10)));

    if (allH2H.length >= 1) h2hStats[pid] = allH2H;
  }
  return h2hStats;
}

// ─────────────────────────────────────────
//  H2H FACTOR  [NEW v5.3]
//  Computes how this player typically performs against tonight's
//  specific opponent vs their overall average.
//  Applied at 20% weight to avoid over-fitting to small samples.
// ─────────────────────────────────────────
function calcH2HFactor(h2hRows, statKey, overallAvg) {
  if (!h2hRows || !h2hRows.length) return { factor:1.0, h2hAvg:null, games:0, desc:'No H2H data' };

  const vals = h2hRows.slice(0, 8).map(s => parseFloat(s[statKey] || 0));
  if (!vals.length || overallAvg < 0.5) return { factor:1.0, h2hAvg:null, games:0, desc:'Insufficient H2H data' };

  // Exponential decay weighting — most recent H2H game matters most
  let wSum = 0, wTotal = 0;
  vals.forEach((v, i) => {
    const w = Math.pow(0.80, i); // steeper decay for H2H (older matchups less relevant)
    wSum   += v * w;
    wTotal += w;
  });
  const h2hAvg = wSum / wTotal;

  // Delta: how much better/worse vs this team than overall average
  const delta    = h2hAvg - overallAvg;
  const relDelta = delta / Math.max(overallAvg, 0.1);

  // Apply at 20% weight — H2H sample is small, don't over-fit
  // Capped tightly: max ±8% adjustment
  const factor = Math.max(0.92, Math.min(1.08, 1.0 + relDelta * 0.20));

  const gamesLabel = `${vals.length} game${vals.length > 1 ? 's' : ''}`;
  let desc;
  if (factor > 1.03)      desc = `H2H avg ${h2hAvg.toFixed(1)} vs ${overallAvg.toFixed(1)} overall (${gamesLabel}) — favourable matchup history (+${((factor-1)*100).toFixed(1)}%)`;
  else if (factor < 0.97) desc = `H2H avg ${h2hAvg.toFixed(1)} vs ${overallAvg.toFixed(1)} overall (${gamesLabel}) — struggles vs this team (${((factor-1)*100).toFixed(1)}%)`;
  else                    desc = `H2H avg ${h2hAvg.toFixed(1)} vs ${overallAvg.toFixed(1)} overall (${gamesLabel}) — neutral matchup history`;

  return { factor:parseFloat(factor.toFixed(4)), h2hAvg:parseFloat(h2hAvg.toFixed(1)), overallAvg:parseFloat(overallAvg.toFixed(1)), games:vals.length, delta:parseFloat(delta.toFixed(1)), desc };
}

// ─────────────────────────────────────────
//  MULTI-BOOK CONSENSUS LINE  [NEW v5.3]
//
//  Derives a consensus market line from all available books.
//  Multiple books agreeing = stronger prior signal than FD alone.
//  When books are split on the line, confidence in the prior drops.
// ─────────────────────────────────────────
function computeMultiBookConsensus(propsByGame, gameId, pid, propType) {
  const props = propsByGame[gameId] || [];
  const entries = props.filter(p =>
    p.player_id === pid &&
    p.prop_type === propType &&
    p.line_value != null &&
    p.market?.type === 'over_under'
  ).map(p => ({
    line:       parseFloat(p.line_value),
    overOdds:   p.market.over_odds,
    underOdds:  p.market.under_odds,
    vendor:     p.vendor,
  }));

  if (!entries.length) return null;

  // Deduplicate by vendor, prefer FanDuel
  const byVendor = {};
  for (const e of entries) {
    if (!byVendor[e.vendor] || e.vendor === 'fanduel') byVendor[e.vendor] = e;
  }
  const unique = Object.values(byVendor);

  const lines      = unique.map(e => e.line).sort((a,b) => a-b);
  const medianLine = lines[Math.floor(lines.length / 2)];
  const minLine    = Math.min(...lines);
  const maxLine    = Math.max(...lines);
  const lineRange  = parseFloat((maxLine - minLine).toFixed(1));

  // Consensus strength: tight range across many books = very reliable prior
  const isConsensus  = lineRange <= 0.5 && unique.length >= 2;
  const priorWeight  = isConsensus ? 0.38 : unique.length >= 3 ? 0.33 : 0.30;

  const fdLine = unique.find(e => e.vendor === 'fanduel')?.line;

  return { medianLine, fdLine, bookCount:unique.length, lineRange, isConsensus, priorWeight, entries:unique };
}

// ─────────────────────────────────────────
//  OPPONENT FATIGUE FACTOR  [NEW v5.3]
//
//  When the opposing TEAM is fatigued (B2B, 3-in-4), their
//  defensive intensity drops — this player gets a small boost.
//  Uses teamSchedules data already in memory — no extra API calls.
// ─────────────────────────────────────────
function calcOpponentFatigue(oppTeamId, teamSchedules, todayStr) {
  const sched     = teamSchedules[oppTeamId] || [];
  const todayDate = new Date(todayStr + 'T12:00:00');

  const lastGame = sched[0] || null;
  const daysSince = lastGame
    ? Math.round((todayDate - new Date(lastGame + 'T12:00:00')) / (1000*60*60*24))
    : null;

  const games4d = sched.filter(d => {
    const diff = Math.round((todayDate - new Date(d + 'T12:00:00')) / (1000*60*60*24));
    return diff >= 1 && diff <= 4;
  }).length;

  let factor = 1.0, desc = 'Opponent well-rested';
  if (games4d >= 3) {
    factor = 1.028;
    desc   = `Opp played 3 games in 4 nights — fatigued defense (+2.8%)`;
  } else if (daysSince === 1) {
    factor = 1.018;
    desc   = `Opponent on B2B (played yesterday) — fatigued defense (+1.8%)`;
  } else if (games4d >= 2 && daysSince <= 2) {
    factor = 1.012;
    desc   = `Opponent on compressed schedule (${games4d} games in 4 nights) — mild fatigue (+1.2%)`;
  }

  return { factor:parseFloat(factor.toFixed(4)), daysSince, games4d, desc };
}
