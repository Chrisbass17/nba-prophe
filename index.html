<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="NBA Prophet">
  <meta name="theme-color" content="#09090f">
  <title>NBA Prophet v5</title>
  <!-- PWA manifest inline -->
  <link rel="manifest" href="data:application/manifest+json,{%22name%22:%22NBA%20Prophet%20v5%22,%22short_name%22:%22NBA%20Prophet%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22background_color%22:%22%2309090f%22,%22theme_color%22:%22%2309090f%22,%22icons%22:[{%22src%22:%22data:image/svg+xml,<svg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 100 100\'><text y=\'.9em\' font-size=\'90\'>%F0%9F%8F%80</text></svg>%22,%22sizes%22:%22any%22,%22type%22:%22image/svg+xml%22}]}">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:#09090f;color:#dde6f5;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;min-height:100vh;}
    #loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:32px;gap:16px;}
    .ls-logo{font-size:32px;font-weight:800;letter-spacing:5px;color:#00d4aa;}
    .ls-pct{font-size:56px;font-weight:800;color:#00d4aa;font-variant-numeric:tabular-nums;letter-spacing:-2px;line-height:1;}
    .ls-bar-wrap{width:240px;height:3px;background:#1a2235;border-radius:2px;overflow:hidden;}
    .ls-bar{height:100%;width:0%;background:linear-gradient(90deg,#00d4aa,#4fa3ff);border-radius:2px;transition:width .35s ease;}
    .ls-msg{font-size:12px;color:#3a4a65;letter-spacing:.5px;text-align:center;}
    #error-screen{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:32px;gap:12px;text-align:center;}
    .err-icon{font-size:48px;}
    .err-title{font-size:18px;font-weight:700;color:#ff3d5a;}
    .err-msg{font-size:13px;color:#7a90b5;max-width:280px;line-height:1.6;}
    .err-retry{background:#003d30;color:#00d4aa;border:1px solid #00d4aa;border-radius:8px;padding:12px 24px;font-size:14px;font-weight:700;cursor:pointer;letter-spacing:.5px;margin-top:8px;}
  </style>
</head>
<body>

<div id="loading-screen">
  <div class="ls-logo">NBA PROPHET</div>
  <div class="ls-pct" id="ls-pct">0%</div>
  <div class="ls-bar-wrap"><div class="ls-bar" id="ls-bar"></div></div>
  <div class="ls-msg" id="ls-msg">Connecting...</div>
</div>

<div id="nba-app" style="display:none"></div>

<div id="error-screen">
  <div class="err-icon">⚠️</div>
  <div class="err-title">Failed to load</div>
  <div class="err-msg" id="err-msg">Could not connect to the NBA API. Check your connection and try again.</div>
  <button class="err-retry" onclick="location.reload()">Try Again</button>
</div>

<script>
// ════════════════════════════════════════
// GLOBALS — populated by main() after data fetch
// ════════════════════════════════════════
var AP = [], PROP_LOGS = {}, GAME_CARDS = [], REF_TABLE = {};
var API_KEY_WV = '', BASE_WV = 'https://api.balldontlie.io';
var CS = 'conf';
var SL     = {points:'PTS',rebounds:'REB',assists:'AST',threes:'3PM',steals:'STL',blocks:'BLK'};
var SLLONG = {points:'Points',rebounds:'Rebounds',assists:'Assists',threes:'Threes',steals:'Steals',blocks:'Blocks'};
var TIER_COL = {'VERY HIGH':'#ff3d5a','HIGH':'#ffb627','AVERAGE':'#7a90b5','LOW':'#00d4aa','VERY LOW':'#4fa3ff'};

// ════════════════════════════════════════
// PICKS + RECORD SYSTEM (localStorage)
// ════════════════════════════════════════
function loadPicks() {
  try { return JSON.parse(localStorage.getItem('nba_picks_v2')||'[]'); } catch(e){ return []; }
}
function savePicks(picks) {
  try { localStorage.setItem('nba_picks_v2', JSON.stringify(picks)); } catch(e){}
}
function loadRecord() {
  try {
    const raw = localStorage.getItem('nba_record_v2');
    const parsed = raw ? JSON.parse(raw) : null;
    if (parsed && parsed['70']) return parsed;
  } catch(e){}
  return {"70":{"w":0,"l":0,"p":0},"80":{"w":0,"l":0,"p":0},"90":{"w":0,"l":0,"p":0}};
}
function saveRecord(rec) {
  try { localStorage.setItem('nba_record_v2', JSON.stringify(rec)); } catch(e){}
}

function addPick(idx) {
  const r = AP[idx];
  if (!r) return;
  const picks = loadPicks();
  // Prevent duplicates
  if (picks.find(p=>p.pid===r.pid && p.statType===r.statType && p.gameId===r.gameId)) {
    alert(r.playerName+' '+SLLONG[r.statType]+' already in picks');
    return;
  }
  picks.push({
    id: Date.now(),
    pid: r.pid,
    playerName: r.playerName,
    team: r.team,
    gameId: r.gameId,
    gameLabel: r.gameLabel,
    statType: r.statType,
    line: r.line,
    rec: r.rec,
    conf: r.conf,
    proj: r.proj,
    ppLine: r.ppLine,
    addedAt: new Date().toISOString(),
    result: null,  // null=pending, 'W','L','P'
    liveVal: null,
    finalVal: null,
  });
  savePicks(picks);
  closeHist();
  showPage('picks');
}

function removePick(id) {
  const picks = loadPicks().filter(p=>p.id!==id);
  savePicks(picks);
  renderPicks();
}

function clearAllPicks() {
  if (!confirm('Clear all picks?')) return;
  savePicks([]);
  renderPicks();
}

function markResult(id, result, finalVal) {
  try {
    const picks = loadPicks();
    const idx = picks.findIndex(p=>p.id===id);
    if (idx===-1) return;
    const wasNull = picks[idx].result === null || picks[idx].result === 'LIVE';
    picks[idx].result = result;
    picks[idx].finalVal = finalVal;
    savePicks(picks);
    if (wasNull && result !== null && result !== 'LIVE') {
      const rec = loadRecord();
      const conf = picks[idx].conf;
      [70,80,90].filter(t=>conf>=t).forEach(t=>{
        if(!rec[t]) rec[t]={w:0,l:0,p:0};
        if(result==='W') rec[t].w++;
        else if(result==='L') rec[t].l++;
        else if(result==='P') rec[t].p++;
      });
      saveRecord(rec);
    }
    renderPicks();
  } catch(e){ console.error('markResult:', e); }
}

function recordBarHTML(containerId) {
  try {
    const rec = loadRecord();
    const picks = loadPicks();
    const pending = picks.filter(p=>p.result===null).length;
    const live    = picks.filter(p=>p.result==='LIVE').length;
    let html = '<div class="rec-bar"><div class="rec-bar-title">RECORD TRACKER</div>';
    ['70','80','90'].forEach(t=>{
      const r = rec[t] || {w:0,l:0,p:0};
      const tot = (r.w||0)+(r.l||0)+(r.p||0);
      const pct = tot ? Math.round((r.w||0)/tot*100) : 0;
      const col = pct>=60?'#00d4aa':pct>=50?'#ffb627':'#ff3d5a';
      html += '<div class="rec-tier">'
        +'<div class="rec-tier-lbl">'+t+'+</div>'
        +'<div class="rec-tier-wl">'+(r.w||0)+'-'+(r.l||0)+(r.p?'-'+r.p:'')+'</div>'
        +'<div class="rec-tier-pct" style="color:'+col+'">'+(tot?pct+'%':'—')+'</div>'
        +'</div>';
    });
    if (pending||live) {
      html += '<div class="rec-tier">'
        +'<div class="rec-tier-lbl">PENDING</div>'
        +'<div class="rec-tier-wl" style="color:#ffb627">'+pending+'</div>'
        +'<div class="rec-tier-pct" style="color:#ffb627">'+(live?live+' LIVE':'')+'</div>'
        +'</div>';
    }
    html += '</div>';
    return html;
  } catch(e) {
    return '<div class="rec-bar"><div class="rec-bar-title">RECORD TRACKER</div></div>';
  }
}

function renderPicks() {
  const picks = loadPicks();
  // Update record bar
  const rb = document.getElementById('picks-record-bar');
  if (rb) rb.innerHTML = recordBarHTML('picks');

  const container = document.getElementById('picks-list');
  if (!container) return;
  if (!picks.length) {
    container.innerHTML='<div class="picks-empty"><div style="font-size:32px;margin-bottom:8px">🎯</div><div style="font-size:14px;font-weight:600;color:#7a90b5">No picks yet</div><div style="font-size:12px;color:#3a4a65;margin-top:4px">Tap any prop card and hit Add to Picks</div></div>';
    return;
  }

  container.innerHTML = picks.slice().reverse().map(p=>{
    const rc   = p.rec==='OVER'?'#00d4aa':'#ff3d5a';
    const rcBg = p.rec==='OVER'?'#003d30':'#3d0010';
    const lineF= parseFloat(p.line);
    const lv   = p.liveVal !== null ? parseFloat(p.liveVal) : null;
    const fv   = p.finalVal !== null ? parseFloat(p.finalVal) : null;
    const displayVal = fv ?? lv;

    // Progress bar fill %
    let progressPct=0, progressCol='#00d4aa';
    if (displayVal !== null && lineF > 0) {
      progressPct = Math.min(100, Math.round((displayVal/lineF)*100));
      progressCol = displayVal>lineF ? '#00d4aa' : displayVal/lineF>0.8 ? '#ffb627' : '#ff3d5a';
    }

    // Status
    let statusHtml='', statusBorder=rc;
    if (p.result==='W') { statusHtml='<span class="pick-status-pill status-win">✓ WIN</span>'; statusBorder='#00d4aa'; }
    else if (p.result==='L') { statusHtml='<span class="pick-status-pill status-loss">✗ LOSS</span>'; statusBorder='#ff3d5a'; }
    else if (p.result==='P') { statusHtml='<span class="pick-status-pill status-pending">PUSH</span>'; statusBorder='#7a90b5'; }
    else if (p.result==='LIVE') { statusHtml='<span class="pick-status-pill status-live">● LIVE</span>'; statusBorder='#ffb627'; }
    else { statusHtml='<span class="pick-status-pill status-pending">PENDING</span>'; }

    const cc=p.conf>=80?'#00d4aa':p.conf>=65?'#ffb627':'#7a90b5';
    const ppNote = p.ppLine ? ' <span class="pp-line-chip">PP '+p.ppLine+'</span>' : '';
    const dateStr = new Date(p.addedAt).toLocaleDateString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'});

    // Manual result buttons (shown if pending/live)
    const resultBtns = (p.result===null||p.result==='LIVE') ? 
      '<div style="display:flex;gap:6px;margin-top:8px">'
      +'<button onclick="markResult('+p.id+',\'W\','+( displayVal ?? 0 )+')" style="flex:1;padding:8px;background:#003d30;color:#00d4aa;border:1px solid #00d4aa;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer">✓ WIN</button>'
      +'<button onclick="markResult('+p.id+',\'L\','+( displayVal ?? 0 )+')" style="flex:1;padding:8px;background:#3d0010;color:#ff3d5a;border:1px solid #ff3d5a;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer">✗ LOSS</button>'
      +'<button onclick="markResult('+p.id+',\'P\','+lineF+')" style="flex:1;padding:8px;background:var(--faint);color:#7a90b5;border:1px solid #3a4a65;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer">— PUSH</button>'
      +'</div>' : '';

    return '<div class="pick-card" style="border-left:3px solid '+statusBorder+'">'
      +'<div class="pick-card-header">'
      +'<div>'
      +'<div class="pick-card-player">'+p.playerName+ppNote+'</div>'
      +'<div class="pick-card-meta">'+p.team+' · '+(SLLONG[p.statType]||p.statType)+' · '+p.gameLabel+'</div>'
      +'<div style="font-size:9px;color:#3a4a65;margin-top:2px">Added '+dateStr+'</div>'
      +'</div>'
      +'<div class="pick-card-status">'+statusHtml
      +'<button class="pick-remove" onclick="removePick('+p.id+')">✕</button>'
      +'</div>'
      +'</div>'
      +'<div class="pick-card-body">'
      +'<div class="pick-line-row">'
      +'<span class="pick-rec" style="color:'+rc+'">'+p.rec+'</span>'
      +'<span class="pick-line-val">'+p.line+'</span>'
      +(displayVal!==null?'<span class="pick-live-val" style="margin-left:auto;color:'+(displayVal>lineF?'#00d4aa':'#ff3d5a')+'">'+displayVal.toFixed(1)+'</span>':'')
      +'</div>'
      +(displayVal!==null?'<div class="pick-progress"><div class="pick-progress-fill" style="width:'+progressPct+'%;background:'+progressCol+'"></div></div>'
        +'<div class="pick-live-row"><span>'+Math.round(progressPct)+'% of line</span><span style="color:'+rc+'">Need '+(p.rec==='OVER'?Math.max(0,lineF-displayVal).toFixed(1)+' more':'stay under')+'</span></div>':'')
      +'<div class="pick-chips" style="margin-top:6px">'
      +'<span class="pick-chip">CONF '+p.conf+'</span>'
      +'<span class="pick-chip" style="color:'+rc+'">PROJ '+p.proj+'</span>'
      +(p.ppLine?'<span class="pick-chip" style="color:#c084fc">PP '+p.ppLine+'</span>':'')
      +'</div>'
      +resultBtns
      +'</div></div>';
  }).join('');
}

// ════════════════════════════════════════
// LIVE BOX SCORE POLLING
// ════════════════════════════════════════
let pollTimer = null;

async function pollLiveStats() {
  const picks = loadPicks();
  const activePicks = picks.filter(p=>p.result===null||p.result==='LIVE');
  if (!activePicks.length) return;

  try {
    const res = await fetch(BASE_WV+'/nba/v1/box_scores/live', {
      headers:{Authorization:API_KEY_WV}
    });
    const data = await res.json();
    const boxes = data.data || [];
    if (!boxes.length) return;

    // Build map: gameId → { playerId → { pts, reb, ast, fg3m, stl, blk, status } }
    const liveMap = {};
    for (const box of boxes) {
      const gid = String(box.game?.id || box.game_id);
      if (!liveMap[gid]) liveMap[gid] = { status: box.game?.status||'', players:{} };
      for (const ps of (box.home_team?.players||[]).concat(box.away_team?.players||[])) {
        if (ps.player?.id) {
          liveMap[gid].players[ps.player.id] = {
            pts:  ps.pts  ?? ps.points  ?? 0,
            reb:  ps.reb  ?? ps.rebounds ?? 0,
            ast:  ps.ast  ?? ps.assists  ?? 0,
            fg3m: ps.fg3m ?? ps.threes   ?? 0,
            stl:  ps.stl  ?? ps.steals   ?? 0,
            blk:  ps.blk  ?? ps.blocks   ?? 0,
          };
        }
      }
    }

    const STAT_KEY = {points:'pts',rebounds:'reb',assists:'ast',threes:'fg3m',steals:'stl',blocks:'blk'};
    let changed = false;

    for (const p of picks) {
      if (p.result==='W'||p.result==='L'||p.result==='P') continue;
      const gameBox = liveMap[p.gameId];
      if (!gameBox) continue;
      const isLive = gameBox.status && !gameBox.status.toLowerCase().includes('final') && gameBox.status!=='';
      const isFinal = gameBox.status?.toLowerCase().includes('final');
      const playerStats = gameBox.players[p.pid];
      if (!playerStats) continue;

      const sk = STAT_KEY[p.statType];
      const val = parseFloat(playerStats[sk] ?? 0);
      const lineF = parseFloat(p.line);

      p.liveVal = val;
      if (isFinal) {
        p.result = val > lineF ? 'W' : val < lineF ? 'L' : 'P';
        p.finalVal = val;
        // Update record
        try {
          const rec = loadRecord();
          ['70','80','90'].filter(t=>p.conf>= +t).forEach(t=>{
            if(!rec[t]) rec[t]={w:0,l:0,p:0};
            if(p.result==='W') rec[t].w++;
            else if(p.result==='L') rec[t].l++;
            else if(p.result==='P') rec[t].p++;
          });
          saveRecord(rec);
        } catch(e){}
      } else if (isLive) {
        p.result = 'LIVE';
      }
      changed = true;
    }

    if (changed) {
      savePicks(picks);
      if (document.getElementById('page-picks').classList.contains('active')) {
        renderPicks();
      }
    }
  } catch(e) { /* network error — retry next poll */ }
}

function startPollTimer() {
  if (pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(pollLiveStats, 60000);  // every 60 seconds
  pollLiveStats(); // immediate first poll
}

// ════════════════════════════════════════
// RECORD TRACKER (shown on top plays + all props)
// ════════════════════════════════════════
function injectRecordBars() {
  // Top plays page
  const tpHeader = document.querySelector('#page-plays .tp-section-header');
  if (tpHeader && !document.getElementById('tp-rec-bar')) {
    const div = document.createElement('div');
    div.id = 'tp-rec-bar';
    div.innerHTML = recordBarHTML('plays');
    tpHeader.after(div);
  }
  // All props page
  const pfTop = document.querySelector('.props-filters');
  if (pfTop && !document.getElementById('ap-rec-bar')) {
    const div = document.createElement('div');
    div.id = 'ap-rec-bar';
    div.innerHTML = recordBarHTML('props');
    pfTop.before(div);
  }
}

// ════════════════════════════════════════
// REFEREE LOOKUP (game detail)
// ════════════════════════════════════════
function lookupRef() {
  const name = document.getElementById('ref-input-val').value.trim();
  const out = document.getElementById('ref-lookup-result');
  if (!name) { out.innerHTML=''; return; }
  const key = Object.keys(REF_TABLE).find(k=>k.toLowerCase().includes(name.toLowerCase()));
  if (!key) { out.innerHTML='<div style="color:#7a90b5;font-size:12px;padding:8px 0">No match found — check spelling</div>'; return; }
  const r = REF_TABLE[key];
  const col = TIER_COL[r.tier]||'#7a90b5';
  out.innerHTML='<div class="ref-row"><span class="ref-name">'+key+'</span>'
    +'<span class="ref-tier" style="background:'+col+'22;color:'+col+'">'+r.tier+'</span>'
    +'<span class="ref-avg">'+r.avg+' fouls/gm</span></div>'
    +'<div class="ref-note">'+r.note+'</div>';
}

// ════════════════════════════════════════
// HISTOGRAM MODAL
// ════════════════════════════════════════
let _currentHistIdx = -1;
function addPickFromHist() {
  if (_currentHistIdx >= 0) addPick(_currentHistIdx);
}
function openHist(idx) {
  _currentHistIdx = idx;
  const r = AP[idx];
  if (!r) return;
  const logKey = r.pid + '_' + r.statType;
  const log10 = (PROP_LOGS[logKey] || []).slice(0,10);
  if (!log10.length) return;
  const rc     = r.rec === 'OVER' ? '#00d4aa' : '#ff3d5a';
  const rcBg   = r.rec === 'OVER' ? '#003d30' : '#3d0010';

  document.getElementById('hist-player').textContent = r.playerName;
  document.getElementById('hist-sub').textContent    =
    r.team + ' \xb7 ' + (SLLONG[r.statType]||r.statType) + ' \xb7 ' + r.gameLabel;

  // PP line and line movement in badge area
  let badgeHTML = '<span class="hist-line-badge" style="background:'+rcBg+';color:'+rc+'">'
    + r.rec + ' ' + r.line + ' \u2014 ' + r.conf + '/100 conf</span>';
  if (r.ppLine) badgeHTML += ' <span class="pp-line-chip">PP '+r.ppLine+'</span>';
  if (r.lineMovement && r.lineMovement.range >= 0.5) {
    const mv = r.lineMovement;
    const mvCol = mv.range >= 1.5 ? '#ff3d5a' : '#ffb627';
    badgeHTML += ' <span class="line-move-chip" style="background:rgba(255,182,39,.12);color:'+mvCol+';border:1px solid '+mvCol+'44">Move: '+mv.lo+'\u2013'+mv.hi+'</span>';
  }
  document.getElementById('hist-line-badge').innerHTML = badgeHTML;

  // Build SVG histogram
  const W = Math.min(window.innerWidth - 32, 568);
  const H = 160;
  const pad = { t:20, r:28, b:44, l:32 };
  const chartW = W - pad.l - pad.r;
  const chartH = H - pad.t - pad.b;
  const n = log10.length;

  const vals  = log10.map(g => g.v);
  const maxV  = Math.max(...vals, line * 1.2, 1);
  const barW  = (chartW / n) * 0.72;
  const gap   = (chartW / n) * 0.28;

  const yScale = v => chartH - (v / maxV) * chartH;
  const lineY  = yScale(line);

  const tickStep = maxV <= 10 ? 2 : maxV <= 20 ? 4 : maxV <= 40 ? 5 : 10;
  const ticks = [];
  for (let t = 0; t <= maxV + tickStep; t += tickStep) if (t <= maxV * 1.1) ticks.push(t);

  const ticksHTML = ticks.map(t =>
    '<line x1="0" y1="'+yScale(t)+'" x2="'+chartW+'" y2="'+yScale(t)+
    '" stroke="#1e2d45" stroke-width="1"/>' +
    '<text x="-4" y="'+(yScale(t)+4)+'" text-anchor="end" font-size="9" fill="#3a4a65">'+t+'</text>'
  ).join('');

  const barsHTML = vals.map((v, i) => {
    const hit  = v > line;
    const fill = hit ? '#00d4aa' : '#ff3d5a';
    const bgFill = hit ? 'rgba(0,212,170,.1)' : 'rgba(255,61,90,.1)';
    const x    = i * (chartW / n) + gap / 2;
    const barH = Math.max(2, (v / maxV) * chartH);
    const y    = chartH - barH;
    const g    = log10[i];
    const lbl  = g.d || '';
    return '<rect x="'+x+'" y="0" width="'+barW+'" height="'+chartH+
      '" fill="'+bgFill+'" rx="2"/>' +
      '<rect x="'+x+'" y="'+y+'" width="'+barW+'" height="'+barH+
      '" fill="'+fill+'" rx="2" opacity="0.9"/>' +
      '<text x="'+(x + barW/2)+'" y="'+(y - 4)+'" text-anchor="middle" font-size="10"'+
      ' font-weight="700" fill="'+fill+'">'+v+'</text>' +
      '<text x="'+(x + barW/2)+'" y="'+(chartH + 13)+'" text-anchor="middle"'+
      ' font-size="8" fill="#3a4a65" transform="rotate(-35,'+(x+barW/2)+','+(chartH+13)+')">'
      +lbl+'</text>';
  }).join('');

  const projY = yScale(parseFloat(r.proj));
  const projHTML =
    '<line x1="0" y1="'+projY+'" x2="'+chartW+'" y2="'+projY+
    '" stroke="'+rc+'" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.6"/>' +

const API_KEY    = 'fd9a98c7-92b1-4ed4-804e-81838b31968b';
const BASE       = 'https://api.balldontlie.io';
const SEASON     = 2025;
const N_SIMS     = 5000;
const TARGETS    = ['points','rebounds','assists','threes','steals','blocks'];
const STAT_MAP   = { points:'pts', rebounds:'reb', assists:'ast', threes:'fg3m', steals:'stl', blocks:'blk' };
const STAT_LABEL = { points:'Points', rebounds:'Rebounds', assists:'Assists', threes:'Threes', steals:'Steals', blocks:'Blocks' };
const LEAGUE_AVG      = { pts:114.5, reb:43.8, ast:27.0, fg3m:13.8 };
const LEAGUE_AVG_PACE  = 100.0;
const LEAGUE_DEF_RTG   = 113.5;
const LEAGUE_AVG_TOTAL = 224.0;  // League avg combined game total — used for O/U scaling
const EXP_DECAY        = 0.88;   // Exponential recency decay — most recent game ~3.5x weight of oldest in L10
const MIN_PLAYED       = 5;

// Intra-player correlation coefficients
const CORRELATIONS = {
  points:   { points:1.00, rebounds:0.15, assists:0.30, threes:0.45, steals:0.10, blocks:0.05 },
  rebounds: { points:0.15, rebounds:1.00, assists:0.05, threes:-0.10, steals:0.05, blocks:0.20 },
  assists:  { points:0.30, rebounds:0.05, assists:1.00, threes:0.20,  steals:0.15, blocks:-0.05 },
  threes:   { points:0.45, rebounds:-0.10, assists:0.20, threes:1.00, steals:0.05, blocks:-0.10 },
  steals:   { points:0.10, rebounds:0.05, assists:0.15, threes:0.05,  steals:1.00, blocks:0.15 },
  blocks:   { points:0.05, rebounds:0.20, assists:-0.05, threes:-0.10, steals:0.15, blocks:1.00 },
};

const GUARD_POSITIONS    = new Set(['PG','SG','G','PG-SG','SG-PG','SG-SF']);
const FORWARD_POSITIONS  = new Set(['SF','PF','F','SF-PF','PF-SF','SF-SG','PF-C']);
const CENTER_POSITIONS   = new Set(['C','C-PF','PF-C','FC']);

const POSITION_GROUP = pos => {
  if (GUARD_POSITIONS.has(pos))   return 'guard';
  if (CENTER_POSITIONS.has(pos))  return 'center';
  if (FORWARD_POSITIONS.has(pos)) return 'forward';
  return 'wing';
};

const ROLE_MINUTES = { starter:32, sixthMan:24, rotation:18, bench:10 };
const seasonAvgsCache = {};

// ─────────────────────────────────────────
//  INJURY IMPACT MODEL
// ─────────────────────────────────────────
function calcInjuryImpact(pid, playerMeta, injuries, teamId, oppTeamId, statType, seasonAvgsCache) {
  const details   = [];
  let totalFactor = 1.0;
  const myPos     = playerMeta[pid]?.position || '';
  const myPosGrp  = POSITION_GROUP(myPos);
  const mySeasons = seasonAvgsCache[pid];
  const myMinAvg  = mySeasons ? parseMins(mySeasons.min) : 28;

  // PART A: TEAMMATE OUT → usage absorption
  const outTeammates = injuries.filter(inj => {
    const p = inj.player;
    if (!p) return false;
    if (p.id === pid) return false;
    if ((inj.team?.id || p.team?.id) !== teamId) return false;
    const s = inj.status?.toLowerCase() || '';
    return s.includes('out') || s.includes('doubtful');
  });

  for (const inj of outTeammates) {
    const injP   = inj.player;
    const injPos = injP.position || '';
    if (POSITION_GROUP(injPos) !== myPosGrp) continue;
    const injSeasons = seasonAvgsCache[injP.id];
    const injMinAvg  = injSeasons ? parseMins(injSeasons.min) : ROLE_MINUTES.starter;
    const injPtsAvg  = injSeasons ? (injSeasons.pts || 15) : 15;
    const isStar     = injPtsAvg >= 18;
    if (injMinAvg < 28) continue;
    const usageAbsorptionRate = isStar ? 0.40 : 0.30;
    const minutesGained = injMinAvg * usageAbsorptionRate;
    const usageSensitivity = { points:0.85, assists:0.90, threes:0.80, rebounds:0.40 }[statType] || 0.70;
    const minutesFactor = minutesGained * usageSensitivity / Math.max(myMinAvg, 10);
    const boost = Math.min(0.20, minutesFactor);
    if (boost > 0.01) {
      const name = `${injP.first_name||''} ${injP.last_name||'?'}`.trim();
      totalFactor += boost;
      details.push({ type:'teammate_out', player:name, pos:injPos, minAvg:injMinAvg.toFixed(0),
        boost:parseFloat(boost.toFixed(3)),
        desc:`${name} (${injPos}, ${injMinAvg.toFixed(0)} mpg) is out — absorbing ~${minutesGained.toFixed(0)} min → +${(boost*100).toFixed(1)}% ${statType} boost`, isStar });
    }
  }

  // PART B: OPPONENT INJURIES → matchup shift
  const outOpponents = injuries.filter(inj => {
    const p = inj.player;
    if (!p || (inj.team?.id || p.team?.id) !== oppTeamId) return false;
    const s = inj.status?.toLowerCase() || '';
    return s.includes('out') || s.includes('doubtful');
  });

  for (const inj of outOpponents) {
    const injP       = inj.player;
    const injPos     = injP.position || '';
    const injPosGrp  = POSITION_GROUP(injPos);
    const injSeasons = seasonAvgsCache[injP.id];
    const injPtsAvg  = injSeasons ? (injSeasons.pts || 10) : 10;
    const injIsStarter = injSeasons ? parseMins(injSeasons.min) >= 28 : false;
    if (!injIsStarter) continue;
    const name = `${injP.first_name||''} ${injP.last_name||'?'}`.trim();
    if (injPtsAvg >= 20) {
      const matchupBoost = myPosGrp === 'guard' || myPosGrp === 'wing' ? 0.025 : 0.012;
      if (matchupBoost > 0.005) {
        totalFactor += matchupBoost;
        details.push({ type:'opp_star_out', player:name, pos:injPos, boost:matchupBoost,
          desc:`${name} (${injPtsAvg.toFixed(0)} ppg, opp star) is out — defensive scheme disrupted → +${(matchupBoost*100).toFixed(1)}%`, isStar:true });
      }
    }
    if (injPosGrp === myPosGrp && injIsStarter && (statType === 'points' || statType === 'threes')) {
      const defBoost = injPtsAvg >= 15 ? 0.020 : 0.012;
      totalFactor += defBoost;
      details.push({ type:'opp_defender_out', player:name, pos:injPos, boost:defBoost,
        desc:`${name} (${injPos}, opp starter) is out — backup defends our position → +${(defBoost*100).toFixed(1)}% for ${statType}`, isStar:false });
    }
  }

  totalFactor = Math.max(0.80, Math.min(1.25, totalFactor));
  const teamInjuries = details.filter(d=>d.type==='teammate_out');
  const oppInjuries  = details.filter(d=>d.type.startsWith('opp_'));
  let desc = '';
  if (!details.length) {
    desc = 'No injury adjustments — all relevant players healthy';
  } else {
    const parts = [];
    if (teamInjuries.length) parts.push(`${teamInjuries.length} teammate(s) out (usage boost)`);
    if (oppInjuries.length)  parts.push(`${oppInjuries.length} opponent(s) out (matchup boost)`);
    const netPct = ((totalFactor - 1) * 100).toFixed(1);
    desc = `${parts.join(' · ')} → net ${totalFactor>1?'+':''}${netPct}% injury adjustment`;
  }
  return { factor:parseFloat(totalFactor.toFixed(4)), teamInjuries, oppInjuries, details, desc, anyAdjustment:details.length>0 };
}

function injPts(n) { return n ? `${n.toFixed(0)}` : '?'; }

// ─────────────────────────────────────────
//  GAME TOTAL / PACE-TOTAL ADJUSTMENT  [NEW v5]
//
//  The game O/U total encodes expected possession count and pace.
//  Higher totals = more possessions = more counting stat opportunities.
//  Each stat type has a different sensitivity to total changes.
// ─────────────────────────────────────────
function calcTotalFactor(gameTotal, statType) {
  if (!gameTotal || isNaN(gameTotal)) return { factor:1.0, desc:'Game total unavailable', gameTotal:null };

  const diff = gameTotal - LEAGUE_AVG_TOTAL;

  // Sensitivity: how much does each stat change per point of total above/below league avg?
  // Points most sensitive (it IS the total), rebounds/ast moderately, steals/blocks least
  const sensitivity = {
    points:   0.0042,   // ~1% per 2.4 pts above avg
    assists:  0.0035,   // ~1% per 2.9 pts
    threes:   0.0030,   // ~1% per 3.3 pts
    rebounds: 0.0025,   // ~1% per 4 pts (less affected by pace)
    steals:   0.0018,
    blocks:   0.0015,
  }[statType] || 0.003;

  const rawFactor = 1.0 + diff * sensitivity;
  const factor    = Math.max(0.93, Math.min(1.07, rawFactor));
  const pctChange = ((factor - 1) * 100).toFixed(1);

  let desc;
  if (factor > 1.02) {
    desc = `High-total game (O/U ${gameTotal} vs ${LEAGUE_AVG_TOTAL} avg) — more possessions boost ${statType} +${pctChange}%`;
  } else if (factor < 0.98) {
    desc = `Low-total game (O/U ${gameTotal} vs ${LEAGUE_AVG_TOTAL} avg) — fewer possessions suppress ${statType} ${pctChange}%`;
  } else {
    desc = `Near-average total (O/U ${gameTotal}) — no significant pace adjustment`;
  }

  return { factor:parseFloat(factor.toFixed(4)), gameTotal, diff:parseFloat(diff.toFixed(1)), sensitivity, desc };
}

// ─────────────────────────────────────────
//  ALT LINE COLLECTOR  [NEW v5]
//  Extracts all available lines for a player/stat from propsByGame
//  (books often post multiple alt lines at different prices)
// ─────────────────────────────────────────
function collectAltLines(propsByGame, gameId, playerId, statType) {
  const props = propsByGame[gameId] || [];
  const byLine = {};

  for (const p of props) {
    if (p.player_id !== playerId || p.prop_type !== statType) continue;
    if (p.market?.type !== 'over_under') continue;
    const line = parseFloat(p.line_value);
    if (isNaN(line)) continue;

    const existing = byLine[line];
    const isFD     = p.vendor?.toLowerCase() === 'fanduel';
    const hadFD    = existing?.vendor?.toLowerCase() === 'fanduel';

    if (!existing || (isFD && !hadFD)) {
      byLine[line] = {
        line,
        overOdds:  p.market.over_odds  ?? null,
        underOdds: p.market.under_odds ?? null,
        vendor:    p.vendor?.toLowerCase() || 'unknown',
      };
    }
  }

  return Object.values(byLine).sort((a, b) => a.line - b.line);
}

// ─────────────────────────────────────────
//  ALT LINE EDGE SCANNER  [NEW v5]
//
//  Scans a ladder of alt lines around the main line.
//  Uses actual book odds when available, otherwise estimates
//  from a standard -110 juice model.
//  Returns sorted results — best EV play at top.
// ─────────────────────────────────────────
// ─────────────────────────────────────────
//  ALT LINE SCANNER — REAL DATA  [v5.1]
//
//  Uses actual L10 and L20 game log hit rates instead of
//  Gaussian simulation. Real outcomes are the ground truth —
//  no distributional assumption needed.
//
//  Probability model:
//    • L10 hit rate  (60% weight — more recent, more relevant)
//    • L20 hit rate  (40% weight — larger sample, less noise)
//    • Blended rate used for EV calculation
//
//  Edge signal: if blended hit rate diverges meaningfully from
//  the book's implied probability (derived from actual odds or
//  assumed -110), that gap is the EV.
// ─────────────────────────────────────────
function scanAltLines(gameLog, mainLine, altLineData, statType) {
  const mainLineF = parseFloat(mainLine);

  // Build index of actual book prices by line
  const actualByLine = {};
  for (const al of altLineData) actualByLine[al.line] = al;

  // Step size for synthetic ladder points
  const step = {
    points:   2.5,
    rebounds: 1.5,
    assists:  1.5,
    threes:   0.5,
    steals:   0.5,
    blocks:   0.5,
  }[statType] || 1.0;

  const range = 4; // steps each direction from main line
  const ladderLines = new Set();
  for (let i = -range; i <= range; i++) {
    ladderLines.add(parseFloat((mainLineF + i * step).toFixed(1)));
  }
  // Include any actual book lines that fall outside the synthetic range
  for (const al of altLineData) ladderLines.add(al.line);

  const l10 = gameLog.slice(0, 10);
  const l20 = gameLog.slice(0, 20);

  const results = [];

  for (const line of [...ladderLines].sort((a,b)=>a-b)) {
    // ── REAL HIT RATES FROM ACTUAL GAME LOG ──────────────────
    const l10Hits   = l10.filter(g => g.value > line).length;
    const l20Hits   = l20.filter(g => g.value > line).length;
    const l10OverPct = l10.length ? Math.round(l10Hits / l10.length * 100) : 50;
    const l20OverPct = l20.length ? Math.round(l20Hits / l20.length * 100) : 50;

    // Blended probability — weight L10 more (recency) but temper with L20 (sample size)
    // If L10 and L20 agree, high confidence. If they diverge, blend hedges.
    const blendedOverPct  = Math.round(l10OverPct * 0.60 + l20OverPct * 0.40);
    const blendedUnderPct = 100 - blendedOverPct;
    // ─────────────────────────────────────────────────────────

    const bookLine = actualByLine[line];
    const overOdds  = bookLine?.overOdds  ?? -110;
    const underOdds = bookLine?.underOdds ?? -110;
    const hasActualOdds = !!bookLine;

    const overEV  = calcEV(blendedOverPct,  overOdds);
    const underEV = calcEV(blendedUnderPct, underOdds);

    const overEVval  = overEV.ev  ?? -999;
    const underEVval = underEV.ev ?? -999;
    const bestSide   = overEVval >= underEVval ? 'OVER' : 'UNDER';
    const bestEV     = bestSide === 'OVER' ? overEV : underEV;
    const bestPct    = bestSide === 'OVER' ? blendedOverPct : blendedUnderPct;
    const bestOdds   = bestSide === 'OVER' ? overOdds : underOdds;

    // Agreement signal: do L10 and L20 agree on direction?
    const l10Direction = l10OverPct >= 50 ? 'over' : 'under';
    const l20Direction = l20OverPct >= 50 ? 'over' : 'under';
    const historiesAgree = l10Direction === l20Direction;
    const confidenceDrop = Math.abs(l10OverPct - l20OverPct);  // divergence between samples

    results.push({
      line,
      l10Hits, l10Games: l10.length, l10OverPct, l10UnderPct: 100 - l10OverPct,
      l20Hits, l20Games: l20.length, l20OverPct, l20UnderPct: 100 - l20OverPct,
      blendedOverPct, blendedUnderPct,
      overOdds, underOdds, hasActualOdds,
      overEV, underEV, bestSide, bestEV, bestPct, bestOdds,
      historiesAgree, confidenceDrop,
      isMainLine: Math.abs(line - mainLineF) < 0.05,
    });
  }

  return results.sort((a, b) => (b.bestEV.ev ?? -999) - (a.bestEV.ev ?? -999));
}

async function get(path) {
  for (let attempt = 0; attempt < 3; attempt++) {
    let timer;
    try {
      const controller = new AbortController();
      timer = setTimeout(() => controller.abort(), 20000);
      const res = await fetch(BASE + path, {
        headers: { Authorization: API_KEY },
        signal: controller.signal
      });
      clearTimeout(timer);
      if (!res.ok) throw new Error(res.status);
      return await res.json();
    } catch(e) {
      clearTimeout(timer);
      if (attempt === 2) return { data: [] };
      await new Promise(r => setTimeout(r, 800 * (attempt + 1)));
    }
  }
  return { data: [] };
}

async function fetchAllBookOdds(gameIds, date) {
  let rows = [];
  const dr = await get(`/nba/v2/odds?dates[]=${date}&per_page=100`);
  rows = dr.data || [];
  if (!rows.length && gameIds.length) {
    const q = gameIds.slice(0,5).map(id=>`game_ids[]=${id}`).join('&');
    const gr = await get(`/nba/v2/odds?${q}&per_page=100`);
    rows = gr.data || [];
  }
  const byGame = {};
  for (const r of rows) {
    if (!byGame[r.game_id]) byGame[r.game_id] = {};
    byGame[r.game_id][r.vendor] = r;
  }
  return byGame;
}

function calcSharpData(game, allBookOdds, gameSim) {
  const bookOdds = allBookOdds[game.id] || {};
  const vendors  = Object.keys(bookOdds);
  const homeMls  = vendors.map(v => bookOdds[v].moneyline_home_odds).filter(Boolean);
  const awayMls  = vendors.map(v => bookOdds[v].moneyline_away_odds).filter(Boolean);
  const bestHomeML  = homeMls.length ? Math.min(...homeMls) : null;
  const worstHomeML = homeMls.length ? Math.max(...homeMls) : null;
  const lineSpread  = bestHomeML && worstHomeML ? Math.abs(worstHomeML - bestHomeML) : 0;
  function mlToProb(ml) {
    if (!ml) return 50;
    return ml < 0 ? Math.round(Math.abs(ml)/(Math.abs(ml)+100)*100) : Math.round(100/(ml+100)*100);
  }
  const impliedHome = bestHomeML ? mlToProb(bestHomeML) : 50;
  const impliedAway = 100 - impliedHome;
  const simHomeWin  = gameSim?.hWin || 50;
  const simAwayWin  = gameSim?.aWin || 50;
  const homeEdge = simHomeWin - impliedHome;
  const awayEdge = simAwayWin - impliedAway;
  let sharpSide  = Math.abs(homeEdge) > Math.abs(awayEdge) ? (homeEdge > 0 ? 'home' : 'away') : (awayEdge > 0 ? 'away' : 'home');
  let sharpScore = Math.min(95, 50 + Math.abs(homeEdge > awayEdge ? homeEdge : awayEdge) * 2);
  if (lineSpread < 10) sharpScore = Math.min(95, sharpScore + 10);
  if (lineSpread > 25) sharpScore = Math.max(30, sharpScore - 15);
  const sharpMoneyPct   = Math.min(90, Math.max(10, sharpScore));
  const publicTicketPct = Math.min(85, Math.max(15, 100 - sharpMoneyPct + (Math.random()*20-10)));
  const publicMoneyPct  = Math.min(85, Math.max(15, 100 - sharpMoneyPct + (Math.random()*15-7)));
  const sharpTeam = sharpSide === 'home' ? game.home_team : game.visitor_team;
  const fadeTeam  = sharpSide === 'home' ? game.visitor_team : game.home_team;
  let movementNote = 'Line stable across books.';
  if (lineSpread >= 20) movementNote = `${lineSpread}-pt spread across books suggests active line movement.`;
  else if (lineSpread < 5) movementNote = `Tight consensus — market locked in on ${sharpTeam.abbreviation}.`;
  return { vendors, bookOdds, homeMls, awayMls, bestHomeML, worstHomeML, lineSpread,
    impliedHome, impliedAway, homeEdge:Math.round(homeEdge), awayEdge:Math.round(awayEdge),
    sharpSide, sharpScore:Math.round(sharpScore), sharpTeam, fadeTeam,
    sharpMoneyPct:Math.round(sharpMoneyPct), publicTicketPct:Math.round(publicTicketPct),
    publicMoneyPct:Math.round(publicMoneyPct), movementNote, simHomeWin, simAwayWin };
}

function parseMins(str) {
  if (!str) return 0;
  const s = String(str).trim();
  if (!s || s === '0' || s === '0:00' || s === '00' || s === '00:00') return 0;
  const parts = s.split(':');
  return parseFloat(parts[0]) + (parts[1] ? parseFloat(parts[1])/60 : 0);
}

// ─────────────────────────────────────────
//  FETCH PLAYER STATS — per-player, recent-first
//
//  Root cause of the "no April games" bug:
//    The batched (5-player) approach with per_page=100 returns
//    the oldest 100 rows across all players in ascending date order.
//    For a full season (Nov–Apr, ~80 games × 5 players = ~400 rows),
//    per_page=100 only returns November–December games — completely
//    missing everything from March/April.
//
//  Fix: fetch one player at a time with seasons[]=${SEASON} and
//  per_page=30. The API returns 30 rows ascending, which we then
//  sort descending. If the player has played ≥30 games this season
//  we may miss their very oldest games, but L20 only needs 20 rows
//  and they will always be the most recent 20 if we cap correctly.
//  If we get <15 games in the season window we extend to the prior
//  season as a fallback.
// ─────────────────────────────────────────
// ─────────────────────────────────────────
//  FETCH PLAYER STATS — full season, most recent first
//
//  Uses seasons[]=${SEASON} (not date windows) to get ALL games
//  a player has played this season. Per_page=100 handles a full
//  82-game regular season in one call. We sort descending so the
//  most recent games are always first.
//
//  Prior-season fallback: if a player has fewer than 10 qualifying
//  games this season (rookie, injury returnee), we supplement with
//  their most recent games from last season so the model has enough
//  data. Prior-season rows are tagged _priorSeason=true so they can
//  be weighted lower in the projection.
// ─────────────────────────────────────────
async function fetchPlayerStats(pids) {
  const rawStats = {}, meta = {};

  for (const pid of pids) {
    // Full current season — per_page=100 covers a complete 82-game season
    const r1 = await get(`/nba/v1/stats?player_ids[]=${pid}&seasons[]=${SEASON}&per_page=100`);
    let rows = (r1.data || []).filter(s => parseMins(s.min) >= MIN_PLAYED);

    // Prior season fallback: supplement thin samples (rookies, injury returnees)
    // Use full per_page=100 to get complete prior season game log
    if (rows.length < 15) {
      const r2 = await get(`/nba/v1/stats?player_ids[]=${pid}&seasons[]=${SEASON - 1}&per_page=100`);
      const priorRows = (r2.data || []).filter(s => parseMins(s.min) >= MIN_PLAYED);
      priorRows.forEach(s => { s._priorSeason = true; });
      rows = [...rows, ...priorRows];
    }

    // Two-season-ago fallback for players with very thin samples (e.g. second-year players)
    if (rows.filter(s => !s._priorSeason).length < 8) {
      const r3 = await get(`/nba/v1/stats?player_ids[]=${pid}&seasons[]=${SEASON - 2}&per_page=100`);
      const prior2Rows = (r3.data || []).filter(s => parseMins(s.min) >= MIN_PLAYED);
      prior2Rows.forEach(s => { s._priorSeason = true; s._twoSeasons = true; });
      rows = [...rows, ...prior2Rows];
    }

    if (!rows.length) continue;

    // Sort descending by date string — ISO format sorts correctly lexicographically
    rows.sort((a, b) => {
      const da = (a.game?.date || '').slice(0, 10);
      const db = (b.game?.date || '').slice(0, 10);
      return db.localeCompare(da);
    });

    rawStats[pid] = rows;
    meta[pid] = rows[0].player;
  }

  return { rawStats, meta };
}

async function fetchPlayerMeta(pids) {
  const meta = {};
  for (let i = 0; i < pids.length; i += 10) {
    const batch = pids.slice(i, i + 10);
    const q = batch.map(id => `player_ids[]=${id}`).join('&');
    const r = await get(`/nba/v1/players/active?${q}&per_page=100`);
    for (const p of (r.data || [])) meta[p.id] = p;
  }
  const missing = pids.filter(pid => !meta[pid]);
  for (let i = 0; i < missing.length; i += 10) {
    const batch = missing.slice(i, i + 10);
    const q = batch.map(id => `player_ids[]=${id}`).join('&');
    const r = await get(`/nba/v1/players?${q}&per_page=100`);
    for (const p of (r.data || [])) if (!meta[p.id]) meta[p.id] = p;
  }
  return meta;
}

function buildGameLog(statRows, playerTeamId, statKey, limit) {
  function teamId(t)   { return typeof t === 'object' ? t?.id : t; }
  function teamAbbr(t) { return typeof t === 'object' ? (t?.abbreviation||'?') : '?'; }
  return statRows.slice(0,limit).map(s => {
    const g = s.game || {};
    const statTeamId = s.team?.id || playerTeamId;
    const homeId  = teamId(g.home_team);
    const isHome  = homeId === statTeamId;
    const oppId   = isHome ? teamId(g.visitor_team) : teamId(g.home_team);
    const oppAbbr = isHome ? teamAbbr(g.visitor_team) : teamAbbr(g.home_team);
    const teamScore = isHome ? (g.home_team_score??null) : (g.visitor_team_score??null);
    const oppScore  = isHome ? (g.visitor_team_score??null) : (g.home_team_score??null);
    const won = teamScore!=null&&oppScore!=null ? teamScore>oppScore : null;
    const rawDate = g.date || '';
    let dateStr = '—';
    if (rawDate) {
      // Always slice to YYYY-MM-DD before parsing — API may return full ISO timestamps.
      // Append T12:00:00 (local noon) so no US timezone rolls the date back a day.
      const dateOnly = rawDate.slice(0, 10);  // "2026-04-03"
      if (/^\d{4}-\d{2}-\d{2}$/.test(dateOnly)) {
        dateStr = new Date(dateOnly + 'T12:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
      }
    }
    return { value:parseFloat((s[statKey]||0).toFixed(1)), date:dateStr, rawDate, opp:oppAbbr,
      oppTeamId:oppId, isHome, min:s.min||'—', minVal:parseMins(s.min), won,
      teamScore:teamScore??'?', oppScore:oppScore??'?' };
  });
}

function collectPropLines(propsByGame) {
  const result = {};

  for (const [gid, props] of Object.entries(propsByGame)) {
    for (const p of props) {
      const type = p.prop_type;
      if (!STAT_MAP[type]) continue;
      // Only accept over_under markets — skip milestone/anytime/other types
      if (p.market?.type !== 'over_under') continue;

      const pid      = p.player_id;
      const lineVal  = parseFloat(p.line_value);  // API returns string e.g. "30.5"
      if (isNaN(lineVal)) continue;

      if (!result[pid]) result[pid] = { gameId:+gid, props:{} };

      const existing  = result[pid].props[type];
      const isFD      = p.vendor?.toLowerCase() === 'fanduel';
      const hadFD     = existing?.vendor?.toLowerCase() === 'fanduel';

      // Priority: prefer FanDuel. Among same vendor, prefer the line closest
      // to the median (avoid taking extreme alt lines as the "main" line).
      // Simple heuristic: if we already have FD and this is also FD, keep
      // the higher line value (FD typically posts the standard line last/highest).
      if (!existing) {
        result[pid].props[type] = {
          line:      lineVal,
          overOdds:  p.market.over_odds  ?? null,
          underOdds: p.market.under_odds ?? null,
          vendor:    p.vendor?.toLowerCase() || 'unknown',
        };
      } else if (isFD && !hadFD) {
        // Upgrade from non-FD to FD
        result[pid].props[type] = {
          line:      lineVal,
          overOdds:  p.market.over_odds  ?? null,
          underOdds: p.market.under_odds ?? null,
          vendor:    'fanduel',
        };
      } else if (isFD && hadFD) {
        // Both FD — keep the one with odds closer to -110 (more likely the main line)
        const existingJuice = Math.abs((existing.overOdds ?? -110) + (existing.underOdds ?? -110));
        const newJuice      = Math.abs((p.market.over_odds ?? -110) + (p.market.under_odds ?? -110));
        if (newJuice < existingJuice) {
          result[pid].props[type] = {
            line:      lineVal,
            overOdds:  p.market.over_odds  ?? null,
            underOdds: p.market.under_odds ?? null,
            vendor:    'fanduel',
          };
        }
      }
      // If existing is FD and new is non-FD: keep existing — no update needed
    }
  }
  return result;
}

function getFDOdds(propsByGame, gid, pid, propType) {
  const props = propsByGame[gid]||[];
  const fd = props.find(p =>
    p.player_id===pid &&
    p.prop_type===propType &&
    p.vendor?.toLowerCase()==='fanduel' &&
    p.market?.type==='over_under'
  );
  if (fd) return { over:fd.market.over_odds, under:fd.market.under_odds };
  // Fall back to any book with over_under market
  const any = props.find(p =>
    p.player_id===pid &&
    p.prop_type===propType &&
    p.market?.type==='over_under'
  );
  if (any) return { over:any.market.over_odds, under:any.market.under_odds };
  return null;
}

//  FACTOR CALCULATIONS
// ═══════════════════════════════════════════════════════

function winsorize(vals) {
  if (vals.length < 4) return { clean:vals, outliers:[], lower:0, upper:Infinity, Q1:0, Q3:0, IQR:0 };
  const sorted = [...vals].sort((a,b)=>a-b);
  function quantile(arr,q) {
    const pos=((arr.length-1)*q), lo=Math.floor(pos), hi=Math.ceil(pos);
    return lo===hi ? arr[lo] : arr[lo]+(arr[hi]-arr[lo])*(pos-lo);
  }
  const Q1=quantile(sorted,0.25), Q3=quantile(sorted,0.75), IQR=Q3-Q1;
  const lower=Math.max(0, Q1-2.0*IQR), upper=Q3+2.0*IQR;
  const outliers=[];
  const clean=vals.map((v,i)=>{
    if (v>upper) { outliers.push({idx:i,original:v,capped:parseFloat(upper.toFixed(1))}); return upper; }
    if (v<lower&&lower>0) { outliers.push({idx:i,original:v,capped:parseFloat(lower.toFixed(1))}); return lower; }
    return v;
  });
  return { clean, outliers, lower:parseFloat(lower.toFixed(1)), upper:parseFloat(upper.toFixed(1)), Q1, Q3, IQR };
}

async function fetchLineups(gameIds) {
  if (!gameIds.length) return {};
  const q = gameIds.map(id=>`game_ids[]=${id}`).join('&');
  const r = await get(`/nba/v1/lineups?${q}&per_page=100`);
  const out = {};
  for (const entry of (r.data || [])) {
    const gid = entry.game_id;
    if (!out[gid]) out[gid] = {};
    const pid    = entry.player?.id;
    const teamId = entry.team?.id;
    if (!pid) continue;
    if (entry.starter) {
      out[gid][`_starters_${teamId}`] = out[gid][`_starters_${teamId}`] || [];
      out[gid][`_starters_${teamId}`].push(pid);
    } else {
      out[gid][`_bench_${teamId}`] = out[gid][`_bench_${teamId}`] || [];
      out[gid][`_bench_${teamId}`].push(pid);
    }
  }
  return out;
}

async function fetchTeamSchedules(teamIds, today) {
  const schedules = {};
  const d14 = new Date(today+'T12:00:00'); d14.setDate(d14.getDate()-14);
  const start = d14.toISOString().split('T')[0];
  for (const teamId of teamIds) {
    const r = await get(`/nba/v1/games?team_ids[]=${teamId}&start_date=${start}&end_date=${today}&per_page=30`);
    const played = (r.data || [])
      .filter(g => g.status && (g.status.toLowerCase().includes('final') || g.home_team_score > 0))
      .map(g => g.date)
      .sort((a,b) => new Date(b+'T12:00:00') - new Date(a+'T12:00:00'));
    schedules[teamId] = played;
  }
  return schedules;
}

// ── INJURY TEAM HELPERS ───────────────────────────────────
// BallDontLie /nba/v1/player_injuries puts team as a SIBLING of player:
//   { player:{id,first_name,...}, team:{id,abbreviation,...}, status }
// NOT nested under player. These helpers resolve team reliably.
function injTeam(inj) {
  return inj.team || inj.player?.team || null;
}
function injTeamId(inj) {
  return injTeam(inj)?.id || null;
}
function injTeamAbbr(inj) {
  return injTeam(inj)?.abbreviation || inj.player?.team?.abbreviation || '?';
}

function enrichInjuries(injuries, rawStats, playerMeta, teamSchedules, today) {
  // Normalize: copy top-level team onto player.team so downstream
  // code using i.player?.team works. Also fill from playerMeta as fallback.
  const enriched = injuries.map(i => {
    const player = i.player ? { ...i.player } : null;
    if (player) {
      if (!player.team && i.team)            player.team = i.team;
      if (!player.team && playerMeta?.[player.id]?.team)
        player.team = playerMeta[player.id].team;
    }
    return { ...i, player, source: i.source || 'api' };
  });
  const playerStatus = {};
  const todayDate = new Date(today+'T12:00:00');

  for (const [pidStr, statRows] of Object.entries(rawStats)) {
    const pid = +pidStr;
    if (!statRows.length) continue;
    const lastPlayedRaw  = statRows[0]?.game?.date || null;
    const lastPlayedDate = lastPlayedRaw ? new Date(lastPlayedRaw+'T12:00:00') : null;
    const daysAgo        = lastPlayedDate ? Math.round((todayDate - lastPlayedDate)/(1000*60*60*24)) : null;
    const meta           = playerMeta[pid];
    const teamId         = meta?.team?.id || statRows[0]?.team?.id;
    const teamSched      = teamId ? (teamSchedules[teamId] || []) : [];
    let missedGames = 0;
    if (teamSched.length && lastPlayedRaw) {
      missedGames = teamSched.filter(d => d > lastPlayedRaw).length;
    }
    const likelyInactive = missedGames >= 2;
    playerStatus[pid] = { lastPlayedDate:lastPlayedRaw, daysAgo, missedGames, likelyInactive, teamSched };
    const existingInj = enriched.find(i => i.player?.id === pid);
    if (existingInj) {
      // Re-check team resolution with playerMeta now available
      if (existingInj.player && !existingInj.player.team) {
        if (existingInj.team)   existingInj.player.team = existingInj.team;
        else if (meta?.team)    existingInj.player.team = meta.team;
      }
      // Also populate top-level team for injTeam() helper
      if (!existingInj.team && meta?.team) existingInj.team = meta.team;
      const status = existingInj.status?.toLowerCase() || '';
      if (status.includes('out') && daysAgo !== null && daysAgo <= 2) {
        existingInj.status = 'Game-Time Decision';
        existingInj.staleCleared = true;
        existingInj._note = `Status updated: played ${daysAgo}d ago, API injury report may be stale`;
      }
    }
    if (likelyInactive && !enriched.find(i => i.player?.id === pid)) {
      const m = playerMeta[pid];
      if (m) {
        enriched.push({
          player: { id:pid, first_name:m.first_name, last_name:m.last_name, team:m.team, position:m.position },
          status: 'Likely Inactive',
          description: `Did not appear in last ${missedGames} team games`,
          source: 'inferred',
          _missedGames: missedGames,
          _lastPlayed:  lastPlayedRaw,
        });
      }
    }
  }
  return { enrichedInjuries:enriched, playerStatus };
}

function calcRestAndFatigue(pid, playerTeamId, teamSchedules, todayStr, playerStatus) {
  const sched = teamSchedules[playerTeamId] || [];
  const lastGameDate = sched[0] || playerStatus[pid]?.lastPlayedDate || null;

  // ── REST FACTOR ──────────────────────────────────────────
  let factor = 1.0, desc = 'Rest data unavailable';
  let daysBetween = null;
  if (lastGameDate) {
    const last  = new Date(lastGameDate + 'T12:00:00');
    const today = new Date(todayStr    + 'T12:00:00');
    daysBetween = Math.round((today - last) / (1000*60*60*24));
    if      (daysBetween <= 1) { factor=0.955; desc=`Back-to-back (0 days rest) — B2B suppressor −4.5%`; }
    else if (daysBetween === 2){ factor=1.000; desc=`1 day rest (normal, no adjustment)`; }
    else if (daysBetween === 3){ factor=1.015; desc=`2 days rest (+1.5%)`; }
    else if (daysBetween === 4){ factor=1.020; desc=`3 days rest (+2%)`; }
    else if (daysBetween <= 7) { factor=1.020; desc=`${daysBetween-1} days rest (+2%)`; }
    else                       { factor=1.015; desc=`${daysBetween-1} days rest — long break (+1.5%)`; }
  }

  // ── FATIGUE: games in last 4 and 7 calendar days ─────────
  // Counts team games that completed BEFORE today (not today's game)
  const todayDate = new Date(todayStr + 'T12:00:00');
  const games4d = sched.filter(d => {
    const diff = Math.round((todayDate - new Date(d + 'T12:00:00')) / (1000*60*60*24));
    return diff >= 1 && diff <= 4;
  }).length;
  const games7d = sched.filter(d => {
    const diff = Math.round((todayDate - new Date(d + 'T12:00:00')) / (1000*60*60*24));
    return diff >= 1 && diff <= 7;
  }).length;

  let fatigueFactor = 1.0, fatigueDesc = 'No fatigue flag';
  if (games4d >= 3) {
    fatigueFactor = 0.945;
    fatigueDesc   = `3 games in 4 nights — heavy fatigue suppressor (−5.5%)`;
  } else if (games7d >= 4) {
    fatigueFactor = 0.970;
    fatigueDesc   = `4 games in 7 nights — moderate fatigue (−3%)`;
  } else if (games7d >= 3) {
    fatigueFactor = 0.985;
    fatigueDesc   = `3 games in 7 nights — mild schedule fatigue (−1.5%)`;
  }

  // Combined rest × fatigue (both suppressor effects stack)
  const combinedFactor = Math.max(0.88, Math.min(1.05, factor * fatigueFactor));

  return { factor:combinedFactor, restFactor:factor, fatigueFactor,
    daysBetween, lastGameDate, games4d, games7d, desc, fatigueDesc };
}
// Keep old name as alias so callers don't need updating
const calcRestFactor = calcRestAndFatigue;

function calcBlowoutFactor(spread, playerIsHome) {
  if (spread==null||isNaN(spread)) return { factor:1.0, desc:'Spread unavailable' };
  const teamSpread = playerIsHome ? spread : -spread;
  let factor, desc;
  if      (teamSpread<=-15) { factor=0.92; desc=`Huge fav (${teamSpread}) — blowout risk, star likely rests 4Q (−8%)`; }
  else if (teamSpread<=-10) { factor=0.95; desc=`Heavy fav (${teamSpread}) — blowout risk (−5%)`; }
  else if (teamSpread<=-6)  { factor=0.97; desc=`Moderate fav (${teamSpread}) — mild blowout risk (−3%)`; }
  else if (teamSpread>=14)  { factor=1.05; desc=`Big underdog (${teamSpread}) — desperate minutes boost (+5%)`; }
  else if (teamSpread>=9)   { factor=1.03; desc=`Underdog (${teamSpread}) — likely plays full game (+3%)`; }
  else if (teamSpread>=5)   { factor=1.01; desc=`Slight underdog (${teamSpread}) — small usage boost (+1%)`; }
  else                      { factor=1.00; desc:`Competitive game (spread ${teamSpread}) — no blowout adjustment`; }
  return { factor, teamSpread, desc };
}

function calcScheduleStrength(gameLog, teamStats, statType) {
  const sk = STAT_MAP[statType];
  const validGames = gameLog.slice(0,10).filter(g=>g.oppTeamId && teamStats[g.oppTeamId]);
  if (validGames.length < 3) return { factor:1.0, adjustedAvg:null, desc:'Schedule data limited', games:[] };
  let totalRaw=0, totalAdj=0, details=[];
  for (const g of validGames) {
    const opp = teamStats[g.oppTeamId];
    const oppAllowed = opp?.[sk] ?? opp?.[`opp_${sk}`] ?? LEAGUE_AVG[sk];
    const defRtg = opp?.def_rating ?? opp?.defensive_rating ?? null;
    let oppStrength;
    if (defRtg && defRtg>90) oppStrength = LEAGUE_DEF_RTG / defRtg;
    else oppStrength = LEAGUE_AVG[sk] / Math.max(oppAllowed, 0.1);
    const normalizedVal = g.value * (1/oppStrength);
    totalRaw += g.value; totalAdj += normalizedVal;
    details.push({ opp:g.opp, raw:g.value, normalized:parseFloat(normalizedVal.toFixed(1)), oppStrength:parseFloat(oppStrength.toFixed(2)) });
  }
  const rawAvg = totalRaw / validGames.length;
  const adjAvg = totalAdj / validGames.length;
  const factor = Math.max(0.90, Math.min(1.10, adjAvg / Math.max(rawAvg, 0.1)));
  let desc;
  if (factor > 1.04)      desc = `Recent schedule was tough (D-adjusted avg +${((factor-1)*100).toFixed(1)}% better than raw)`;
  else if (factor < 0.96) desc = `Recent schedule was weak (D-adjusted avg ${((factor-1)*100).toFixed(1)}% vs raw — numbers may be inflated)`;
  else                    desc = `Recent schedule near average difficulty`;
  return { factor:parseFloat(factor.toFixed(4)), adjustedAvg:parseFloat(adjAvg.toFixed(1)), rawAvg:parseFloat(rawAvg.toFixed(1)), desc, games:details };
}

function calcHomeAwaySplits(gameLog, statKey) {
  const homeGames = gameLog.filter(g=>g.isHome);
  const awayGames = gameLog.filter(g=>!g.isHome);
  const avg = arr => arr.length ? arr.reduce((a,b)=>a+b,0)/arr.length : null;
  const homeAvg = avg(homeGames.map(g=>g.value));
  const awayAvg = avg(awayGames.map(g=>g.value));
  const diff = homeAvg!=null&&awayAvg!=null ? parseFloat((homeAvg-awayAvg).toFixed(1)) : null;
  return { homeAvg:homeAvg!=null?parseFloat(homeAvg.toFixed(1)):null,
    awayAvg:awayAvg!=null?parseFloat(awayAvg.toFixed(1)):null,
    homeGames:homeGames.length, awayGames:awayGames.length, diff };
}

function calcStreakRegression(gameLog, lineVal, l20avg) {
  if (gameLog.length < 5) return { factor:1.0, streak:0, desc:'Insufficient streak data', direction:null };
  const line = parseFloat(lineVal);
  let streak = 1;
  const first = gameLog[0].value > line ? 'over' : 'under';
  for (let i=1; i<Math.min(10,gameLog.length); i++) {
    const isOver = gameLog[i].value > line;
    if ((first==='over')===isOver) streak++;
    else break;
  }
  let factor = 1.0, desc;
  if (streak >= 8) {
    const recentAvg = gameLog.slice(0,5).map(g=>g.value).reduce((a,b)=>a+b,0)/5;
    const regression = (l20avg-recentAvg) * 0.20;
    factor = Math.max(0.88, Math.min(1.12, 1.0 + regression/Math.max(recentAvg,0.1)));
    desc = `${streak} consecutive ${first}s — strong regression to mean applied (${(factor<1?'-':'+')}${Math.abs((factor-1)*100).toFixed(1)}%)`;
  } else if (streak >= 6) {
    const recentAvg = gameLog.slice(0,5).map(g=>g.value).reduce((a,b)=>a+b,0)/5;
    const regression = (l20avg-recentAvg) * 0.12;
    factor = Math.max(0.92, Math.min(1.08, 1.0 + regression/Math.max(recentAvg,0.1)));
    desc = `${streak} consecutive ${first}s — mild regression applied (${(factor<1?'-':'+')}${Math.abs((factor-1)*100).toFixed(1)}%)`;
  } else {
    desc = `${streak} consecutive ${first}${streak>1?'s':''} — no regression needed`;
  }
  return { factor:parseFloat(factor.toFixed(4)), streak, direction:first, desc };
}

function calcPer36(gameLog) {
  const validGames = gameLog.filter(g=>g.minVal>10);
  if (validGames.length < 3) return { per36:null, per36L10:null, desc:'Insufficient minutes data' };
  const per36vals = validGames.slice(0,20).map(g=>(g.value/g.minVal)*36);
  const l10vals   = validGames.slice(0,10).map(g=>(g.value/g.minVal)*36);
  const per36     = per36vals.reduce((a,b)=>a+b,0)/per36vals.length;
  const per36L10  = l10vals.length ? l10vals.reduce((a,b)=>a+b,0)/l10vals.length : per36;
  const avgMin    = validGames.slice(0,10).map(g=>g.minVal).reduce((a,b)=>a+b,0)/Math.min(10,validGames.length);
  return { per36:parseFloat(per36.toFixed(1)), per36L10:parseFloat(per36L10.toFixed(1)),
    avgMin:parseFloat(avgMin.toFixed(1)), per36proj:parseFloat((per36L10*(avgMin/36)).toFixed(1)),
    desc:`Per-36 L10: ${per36L10.toFixed(1)} × (${avgMin.toFixed(0)} avg min / 36) = ${(per36L10*avgMin/36).toFixed(1)} projected` };
}


// ─────────────────────────────────────────
//  RETURN FROM INJURY FACTOR  [NEW v5.2]
//
//  Detects a significant gap (≥8 days) before the player's most
//  recent game in the log. Players returning from injury typically
//  need 3–5 games to ramp back to full production.
// ─────────────────────────────────────────
function calcReturnFromInjury(gameLog) {
  if (gameLog.length < 2) return { factor:1.0, isReturning:false, desc:'' };
  const d0 = (gameLog[0]?.rawDate || '').slice(0,10);
  const d1 = (gameLog[1]?.rawDate || '').slice(0,10);
  if (!d0 || !d1) return { factor:1.0, isReturning:false, desc:'' };

  const gap = Math.round(
    (new Date(d0+'T12:00:00') - new Date(d1+'T12:00:00')) / (1000*60*60*24)
  );
  if (gap < 8) return { factor:1.0, isReturning:false, gapDays:gap, desc:'No recent injury return detected' };

  const gamesSinceReturn = gameLog.filter(g => (g.rawDate||'').slice(0,10) >= d0).length;

  let factor = 1.0, desc = '';
  if (gamesSinceReturn <= 2) {
    factor = 0.955;
    desc = `Returned from ${gap}-day absence — game ${gamesSinceReturn} back, ramp-up suppressor (−4.5%)`;
  } else if (gamesSinceReturn <= 4) {
    factor = 0.978;
    desc = `Returned from ${gap}-day absence — game ${gamesSinceReturn} back, mild ramp-up (−2.2%)`;
  } else {
    desc = `Returned from ${gap}-day absence ${gamesSinceReturn} games ago — fully ramped up`;
  }
  return { factor:parseFloat(factor.toFixed(4)), isReturning:gap>=8, gapDays:gap, gamesSinceReturn, desc };
}

function getPositionalDefFactor(oppTeamId, position, teamStats, statType, recentOppDef) {
  const opp = teamStats[oppTeamId];
  if (!opp) return { factor:1.0, desc:'Positional D data unavailable', posGroup:'wing', isPrimary:false };
  const sk = STAT_MAP[statType];
  const defRtg = opp.def_rating ?? opp.defensive_rating ?? null;
  let posGroup = 'wing';
  if (GUARD_POSITIONS.has(position))        posGroup = 'guard';
  else if (CENTER_POSITIONS.has(position))  posGroup = 'center';
  else if (FORWARD_POSITIONS.has(position)) posGroup = 'forward';
  const primaryStatForPos = { guard:['points','assists','threes'], forward:['points','rebounds'], center:['points','rebounds'], wing:['points','threes'] }[posGroup];
  const isPrimary = primaryStatForPos.includes(statType);

  // ── SEASON DEFENSE FACTOR ─────────────────────────────────
  const allowed = opp[sk] ?? opp[`opp_${sk}`] ?? LEAGUE_AVG[sk];
  const countingFactor = Math.max(0.87, Math.min(1.13, allowed / LEAGUE_AVG[sk]));
  let defRtgFactor = 1.0;
  if (defRtg && defRtg > 90) defRtgFactor = Math.max(0.87, Math.min(1.13, defRtg / LEAGUE_DEF_RTG));
  const defWeight = statType === 'points' ? 0.60 : 0.35;
  let seasonFactor = defRtgFactor * defWeight + countingFactor * (1 - defWeight);
  if (isPrimary) seasonFactor = 1.0 + (seasonFactor - 1.0) * 1.15;
  seasonFactor = Math.max(0.85, Math.min(1.15, seasonFactor));

  // ── RECENT DEFENSE FACTOR (L10 games) ────────────────────
  // More predictive than season average — teams' defensive schemes
  // and personnel change; recent form is the current reality.
  const recentDef = recentOppDef?.[oppTeamId];
  let factor = seasonFactor;
  let recentNote = '';
  if (recentDef && recentDef.games >= 5) {
    // Blend: 55% season (stability), 45% recent (current form)
    const blended = seasonFactor * 0.55 + recentDef.factor * 0.45;
    factor = Math.max(0.85, Math.min(1.15, blended));
    const shift = ((recentDef.factor - seasonFactor) * 100).toFixed(1);
    recentNote = ` | Recent L${recentDef.games} D: ${recentDef.avgAllowed} pts/g (${shift > 0 ? '+' : ''}${shift}% vs season)`;
  }
  factor = parseFloat(factor.toFixed(4));

  let desc;
  if (factor > 1.06)      desc = `${posGroup.toUpperCase()} vs weak ${statType} defense (+${((factor-1)*100).toFixed(1)}%)${isPrimary?' — primary matchup':''}${recentNote}`;
  else if (factor < 0.94) desc = `${posGroup.toUpperCase()} vs strong ${statType} defense (${((factor-1)*100).toFixed(1)}%)${isPrimary?' — primary matchup':''}${recentNote}`;
  else                    desc = `${posGroup.toUpperCase()} vs average ${statType} defense${recentNote}`;

  return { factor, posGroup, isPrimary, desc, seasonFactor:parseFloat(seasonFactor.toFixed(4)), recentDef };
}

function calcEV(simProb, americanOdds) {
  if (!americanOdds) return { ev:null, evStr:'N/A', breakeven:null };
  const prob = simProb/100;
  let profit, breakeven;
  if (americanOdds < 0) {
    profit    = 100/Math.abs(americanOdds)*100;
    breakeven = Math.abs(americanOdds)/(Math.abs(americanOdds)+100)*100;
  } else {
    profit    = americanOdds;
    breakeven = 100/(americanOdds+100)*100;
  }
  const ev = prob*profit - (1-prob)*100;
  return { ev:parseFloat(ev.toFixed(2)), evStr:ev>=0?`+$${ev.toFixed(2)} per $100`:`-$${Math.abs(ev).toFixed(2)} per $100`,
    breakeven:parseFloat(breakeven.toFixed(1)), profitable:ev>0 };
}

function blendWithMarketLine(ourProj, marketLine, consensus) {
  // Use consensus median when available — stronger prior than single book
  const priorLine   = (consensus?.medianLine ?? marketLine);
  const priorWeight = consensus?.priorWeight ?? 0.30;
  const blended     = ourProj * (1 - priorWeight) + priorLine * priorWeight;
  const diff        = ourProj - priorLine;
  const bookNote    = consensus?.bookCount > 1
    ? ` (${consensus.bookCount} books, range ${consensus.lineRange}${consensus.isConsensus ? ' — consensus' : ''})` : '';
  let desc;
  if (Math.abs(diff) < 0.5)      desc = `Model agrees with market${bookNote}`;
  else if (Math.abs(diff) < 1.5) desc = `Small model-market gap (${diff>0?'+':''}${diff.toFixed(1)})${bookNote} — ${Math.round(priorWeight*100)}% prior applied`;
  else                           desc = `Model ${diff>0?'above':'below'} market by ${Math.abs(diff).toFixed(1)}${bookNote} — ${Math.round(priorWeight*100)}% prior blend`;
  return { blended:parseFloat(blended.toFixed(2)), diff:parseFloat(diff.toFixed(2)), priorLine, priorWeight, desc };
}

function applyCorrelations(projections) {
  const result = {};
  for (const stat of TARGETS) {
    let nudge = 0;
    for (const otherStat of TARGETS) {
      if (stat===otherStat) continue;
      const other = projections[otherStat];
      if (!other) continue;
      nudge += (other.edge||0) * CORRELATIONS[stat][otherStat] * 0.08;
    }
    result[stat] = { nudge:parseFloat(nudge.toFixed(2)) };
  }
  return result;
}

// ═══════════════════════════════════════════════════════
//  PROJECTION MODEL
// ═══════════════════════════════════════════════════════

function gauss(mean, std) {
  let u,v,s;
  do { u=Math.random()*2-1; v=Math.random()*2-1; s=u*u+v*v; } while(s>=1||s===0);
  return mean + std*u*Math.sqrt(-2*Math.log(s)/s);
}

function buildProjection(gameLog, factors) {
  const rawVals = gameLog.map(g=>g.value);
  if (rawVals.length<3) return null;

  const w10 = winsorize(rawVals.slice(0,10));
  const w20 = winsorize(rawVals.slice(0,20));
  const l10c = w10.clean, l20c = w20.clean;

  const avg10 = l10c.reduce((a,b)=>a+b,0)/l10c.length;
  const avg20 = l20c.reduce((a,b)=>a+b,0)/l20c.length;
  const rawAvg10 = rawVals.slice(0,10).reduce((a,b)=>a+b,0)/Math.min(10,rawVals.length);

  // ── EXPONENTIAL RECENCY DECAY  [NEW v5] ──────────────────────────────
  // Each game back is weighted by EXP_DECAY^i, so the most recent game
  // carries ~3.5x the weight of the oldest game in the L10 window.
  // This replaces the old linear decay (which gave 10x weight — too aggressive).
  let wSum=0, wTotal=0;
  l10c.forEach((v,i) => {
    const w = Math.pow(EXP_DECAY, i);  // i=0 = most recent game
    wSum  += v * w;
    wTotal += w;
  });
  const wAvg = wSum / wTotal;
  // ─────────────────────────────────────────────────────────────────────

  const schedAvg = factors.scheduleStrength?.adjustedAvg ?? avg10;

  // Blend: 45% exponential-recency, 25% L10 clean, 15% L20, 15% schedule-adjusted
  const base = wAvg*0.45 + avg10*0.25 + avg20*0.15 + schedAvg*0.15;

  const per36proj = factors.per36?.per36proj;
  const blendedBase = per36proj && Math.abs(per36proj-base)<base*0.35
    ? base*0.80 + per36proj*0.20
    : base;

  // Apply all contextual factors
  const contextual = blendedBase
    * (factors.positionalDef?.factor    || 1.0)
    * (factors.pace                     || 1.0)
    * (factors.usage                    || 1.0)
    * (factors.rest?.factor             || 1.0)
    * (factors.blowout?.factor          || 1.0)
    * (factors.injuryImpact?.factor     || 1.0)
    * (factors.homeAway                 || 1.0)
    * (factors.streakRegression?.factor || 1.0)
    * (factors.totalFactor?.factor      || 1.0)
    * (factors.h2hFactor?.factor        || 1.0)    // H2H matchup history
    * (factors.oppFatigue?.factor       || 1.0)    // [NEW v5.3] opponent fatigue
    * (factors.returnFromInjury?.factor || 1.0);

  const lineVal = factors.marketLine;
  let proj = contextual;
  if (lineVal) {
    const blend = blendWithMarketLine(contextual, lineVal, factors.consensus);
    proj = blend.blended;
    factors._marketBlend = blend;
  }

  proj += (factors.corrNudge||0);
  proj = Math.max(0, proj);

  const variance = l10c.map(x=>(x-avg10)**2).reduce((a,b)=>a+b,0)/Math.max(l10c.length-1,1);
  const std = Math.max(Math.sqrt(variance), 1.2);

  return { proj, avg10, avg20, wAvg, std, base:blendedBase, contextual,
    rawAvg10, outliers:w10.outliers, w10upper:w10.upper, schedAvg };
}

function runSim(proj, std, line, fdOdds, cleanGameCount) {
  let ov=0; const sv=[];
  for (let i=0;i<N_SIMS;i++) {
    const v=Math.max(0,gauss(proj,std)); sv.push(v); if(v>line) ov++;
  }
  sv.sort((a,b)=>a-b);
  const op=ov/N_SIMS, edge=proj-line, cv=std/Math.max(proj,0.1);
  let conf=50+Math.min(20,20)+Math.min(20,Math.abs(edge)*5)-Math.min(25,cv*30);
  if(op>0.65||op<0.35) conf+=8;

  // ── SAMPLE SIZE CONFIDENCE PENALTY ───────────────────────
  // Fewer clean qualifying games = less reliable projection.
  // 10 clean games = no penalty. Each missing game costs ~2.5 pts.
  // A player with only 5 clean games loses ~12.5 confidence points.
  if (cleanGameCount != null && cleanGameCount < 10) {
    const samplePenalty = Math.round((10 - cleanGameCount) * 2.5);
    conf -= samplePenalty;
  }
  // ─────────────────────────────────────────────────────────

  conf=Math.max(25,Math.min(96,Math.round(conf)));
  const rec=op>0.545?'OVER':op<0.455?'UNDER':'PUSH';
  const recOdds = rec==='OVER' ? fdOdds?.over : fdOdds?.under;
  const simPct  = rec==='OVER' ? Math.round(op*100) : Math.round((1-op)*100);
  const ev      = calcEV(simPct, recOdds);
  return { proj:parseFloat(proj.toFixed(1)), std:parseFloat(std.toFixed(1)), edge:parseFloat(edge.toFixed(1)),
    overPct:Math.round(op*100), underPct:Math.round((1-op)*100), rec, conf, ev,
    cleanGameCount, samplePenaltyApplied: cleanGameCount != null && cleanGameCount < 10,
    p10:sv[Math.floor(N_SIMS*.10)].toFixed(1), p25:sv[Math.floor(N_SIMS*.25)].toFixed(1),
    p75:sv[Math.floor(N_SIMS*.75)].toFixed(1), p90:sv[Math.floor(N_SIMS*.90)].toFixed(1) };
}

function getPaceFactor(homeId, awayId, teamStats, h2hAdj, recentTeamTotals) {
  const h = teamStats[homeId], a = teamStats[awayId];
  const hp = h?.pace ?? h?.team_pace ?? null;
  const ap = a?.pace ?? a?.team_pace ?? null;

  // ── REAL RECENT COMBINED TOTALS (most accurate) ───────────
  const htot = recentTeamTotals?.[homeId];
  const atot = recentTeamTotals?.[awayId];
  let recentAvgTotal = null, recentNote = '';
  if (htot && atot) {
    // Project the combined total: each team's avg scored vs avg allowed
    recentAvgTotal = (htot.avgScored + atot.avgScored) / 2 + (htot.avgAllowed + atot.avgAllowed) / 2;
    recentAvgTotal = parseFloat((recentAvgTotal / 2 + (htot.avgCombined + atot.avgCombined) / 4).toFixed(1));
    recentNote = ` | Recent avg totals: ${htot.avgCombined}/${atot.avgCombined}`;
  } else if (htot) {
    recentAvgTotal = htot.avgCombined;
  } else if (atot) {
    recentAvgTotal = atot.avgCombined;
  }

  // ── PACE RATING FACTOR ─────────────────────────────────────
  let paceFactor = 1.0;
  if (hp || ap) {
    const paces   = [hp, ap].filter(Boolean);
    const avgPace = paces.reduce((a,b) => a+b, 0) / paces.length;
    paceFactor = Math.max(0.90, Math.min(1.10, avgPace / LEAGUE_AVG_PACE));
  }

  // ── BLEND: pace rating + recent totals + H2H ──────────────
  let factor = paceFactor;
  if (recentAvgTotal) {
    const recentFactor = Math.max(0.92, Math.min(1.08, recentAvgTotal / LEAGUE_AVG_TOTAL));
    // Recent game totals are the most direct signal; weight them heavily
    factor = paceFactor * 0.35 + recentFactor * 0.65;
  }
  if (h2hAdj && h2hAdj.games >= 2) {
    const h2hFactor = Math.max(0.94, Math.min(1.06, h2hAdj.avgTotal / LEAGUE_AVG_TOTAL));
    factor = factor * 0.70 + h2hFactor * 0.30;
  }
  factor = Math.max(0.90, Math.min(1.10, parseFloat(factor.toFixed(4))));

  const displayPace = hp || ap ? ((([hp,ap].filter(Boolean)).reduce((a,b)=>a+b,0)/([hp,ap].filter(Boolean)).length)).toFixed(1) : '?';
  let desc;
  if (factor > 1.03)      desc = `Fast game — pace ${displayPace}, recent avg ${recentAvgTotal||'?'} (+${((factor-1)*100).toFixed(1)}%)${recentNote}`;
  else if (factor < 0.97) desc = `Slow game — pace ${displayPace}, recent avg ${recentAvgTotal||'?'} (${((factor-1)*100).toFixed(1)}%)${recentNote}`;
  else                    desc = `Average pace — ${displayPace} rating, recent avg ${recentAvgTotal||'?'}${recentNote}`;
  return { factor, pace:displayPace, recentAvgTotal, h2hAdj, desc };
}

function getUsageFactor(statRows, seasonAvgMin, playerAdvStats) {
  // ── REAL USAGE% (preferred) ───────────────────────────────
  // BallDontLie advanced stats provide actual usage_percentage.
  // This is more accurate than minutes — a player can play 32 min
  // at 20% usage or 32 min at 35% usage; only real usage captures that.
  if (playerAdvStats?.recentUsagePct) {
    const recentUsage = playerAdvStats.recentUsagePct;
    const seasonUsage = playerAdvStats.seasonUsagePct || recentUsage;
    // League average usage for a starter is ~20%; stars run 28-35%
    const LEAGUE_AVG_USAGE = 20.0;
    // Normalize recent vs season usage shift
    const usageDelta = recentUsage - seasonUsage;
    // Factor: recent usage relative to season, dampened 60%
    const raw = 1.0 + (usageDelta / Math.max(seasonUsage, 1)) * 0.60;
    const factor = Math.max(0.88, Math.min(1.12, parseFloat(raw.toFixed(4))));
    let desc;
    if (factor > 1.04)      desc = `Recent usage ${recentUsage.toFixed(1)}% vs season ${seasonUsage.toFixed(1)}% — elevated role (+${((factor-1)*100).toFixed(1)}%)`;
    else if (factor < 0.96) desc = `Recent usage ${recentUsage.toFixed(1)}% vs season ${seasonUsage.toFixed(1)}% — reduced role (${((factor-1)*100).toFixed(1)}%)`;
    else                    desc = `Usage ${recentUsage.toFixed(1)}% near season avg ${seasonUsage.toFixed(1)}%`;
    return { factor, recentUsagePct:parseFloat(recentUsage.toFixed(1)), seasonUsagePct:parseFloat(seasonUsage.toFixed(1)), source:'advanced', desc };
  }

  // ── MINUTES PROXY (fallback) ─────────────────────────────
  if (!seasonAvgMin || seasonAvgMin < 5) return { factor:1.0, recentMin:null, source:'unavailable', desc:'Usage data unavailable' };
  const recent5 = statRows.slice(0,5).map(s=>parseMins(s.min)).filter(m=>m>5);
  if (recent5.length < 2) return { factor:1.0, recentMin:null, source:'unavailable', desc:'Insufficient recent games' };
  const recentAvgMin = recent5.reduce((a,b)=>a+b,0) / recent5.length;
  const raw = recentAvgMin / seasonAvgMin;
  const dampened = 1.0 + (raw - 1.0) * 0.65;
  const factor = Math.max(0.88, Math.min(1.12, parseFloat(dampened.toFixed(4))));
  let desc;
  if (factor > 1.04)      desc = `Recent L5 avg ${recentAvgMin.toFixed(0)} min vs season ${seasonAvgMin.toFixed(0)} min (+${((factor-1)*100).toFixed(1)}% usage proxy)`;
  else if (factor < 0.96) desc = `Recent L5 avg ${recentAvgMin.toFixed(0)} min vs season ${seasonAvgMin.toFixed(0)} min (${((factor-1)*100).toFixed(1)}% usage proxy)`;
  else                    desc = `Recent minutes (${recentAvgMin.toFixed(0)}) near season avg (${seasonAvgMin.toFixed(0)})`;
  return { factor, recentMin:parseFloat(recentAvgMin.toFixed(1)), source:'minutes', desc };
}

function simGame(total, spread) {
  const hE=(total-spread)/2, aE=(total+spread)/2;
  let hw=0,ov=0;
  for(let i=0;i<N_SIMS;i++){
    const h=Math.max(72,Math.round(gauss(hE,13.5))), a=Math.max(72,Math.round(gauss(aE,13.5)));
    if(h>a) hw++; if(h+a>total) ov++;
  }
  return { hWin:Math.round(hw/N_SIMS*100), aWin:Math.round((N_SIMS-hw)/N_SIMS*100),
    projH:Math.round(hE), projA:Math.round(aE), overPct:Math.round(ov/N_SIMS*100) };
}
